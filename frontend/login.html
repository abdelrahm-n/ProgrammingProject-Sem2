<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Inloggen</title>
  <link rel="stylesheet" href="css/stijl.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-pagina">

  <div class="login-wrapper">
    <div class="login-kaart">

      <h1 id="loginTitel">Inloggen</h1>
      <p class="login-subtitel">EhB - Stageplatform</p>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">E-mailadres</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="voornaam.achternaam@student.ehb.be"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="wachtwoord">Wachtwoord</label>
          <div class="wachtwoord-wrapper">
            <input
              type="password"
              id="wachtwoord"
              name="wachtwoord"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" id="toonWachtwoord" class="oog-knop">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <p id="foutmelding" class="melding melding--fout" hidden></p>

        <button type="submit" class="btn btn--primair btn--login">Inloggen</button>

        <button type="button" id="vergetenBtn" style="background:none;border:none;color:#8B0015;text-decoration:underline;cursor:pointer;margin-top:12px;font-size:0.9em;">Wachtwoord vergeten?</button>
        <p id="resetMelding" class="melding" hidden></p>

      </form>

    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
