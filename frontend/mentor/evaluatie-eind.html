<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Eindevaluatie</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
  <style>
    .ev-titel { font-size: 22px; font-weight: 800; margin: 0 0 18px 0; color: #111827; }
    .ev-kaart { background: #fff; border: 1px solid #d8d8d8; border-radius: 8px; padding: 16px; margin-bottom: 26px; }
    .ev-tabel { width: 100%; border-collapse: collapse; }
    .ev-tabel th, .ev-tabel td {
      text-align: left; vertical-align: top; padding: 11px 12px;
      border-bottom: 1px solid #ececec; font-size: 12.5px; line-height: 1.5;
    }
    .ev-tabel th { font-size: 12px; font-weight: 700; color: #374151; background: #fafafa; }
    .ev-tabel .col-crit { width: 20%; }
    .ev-tabel .col-score { width: 8%; text-align: center; font-weight: 800; font-size: 15px; }
    .ev-crit-titel { font-weight: 700; color: #0f766e; display: block; margin-bottom: 4px; }
    .ev-crit-omschr { color: #6b7280; }

    .ev-beschrijving-titel { font-size: 14px; font-weight: 700; margin: 0 0 8px 0; }
    .ev-beschrijving {
      width: 100%; min-height: 90px; padding: 12px; border: 1px solid #d8d8d8;
      border-radius: 8px; background: #f9f9f9; font-family: inherit; font-size: 14px; color: #111827; line-height: 1.5;
    }
    .ev-acties { display: flex; justify-content: flex-end; margin-top: 18px; gap: 12px; }
    .ev-knop {
      background: #6b7280; color: #fff; border: none; padding: 10px 26px;
      border-radius: 999px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 14px;
    }
    .ev-knop:hover { background: #4b5563; }
  </style>
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <h2 class="ev-titel" id="evTitel">Eindevaluatie (zelfevaluatie)</h2>

        <div class="ev-kaart">
          <table class="ev-tabel">
            <thead>
              <tr>
                <th class="col-crit">Criterium</th>
                <th>5 punten - Volledige score</th>
                <th>3 punten - Goede score</th>
                <th>0 punten - Geen score</th>
                <th class="col-score">Score</th>
              </tr>
            </thead>
            <tbody id="evTabelBody"></tbody>
          </table>
        </div>

        <div class="ev-kaart">
          <p class="ev-beschrijving-titel">Beschrijving student</p>
          <textarea class="ev-beschrijving" readonly placeholder="(beschrijving door student)"></textarea>
        </div>

        <div class="ev-acties">
          <a href="#" id="evTerug" class="ev-knop" style="background:#9ca3af;">Terug</a>
          <button type="button" class="ev-knop" id="evVolgende">Volgende</button>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const stage = params.get('stage') || '';
    const naam = params.get('naam') || 'Student';
    const opleiding = params.get('opleiding') || '';
    const voornaam = naam.split(' ')[0];
    const evaluatieId = params.get('evaluatie') || '';

    document.getElementById('evTitel').textContent = 'Eindevaluatie ' + voornaam.toUpperCase() + ' (zelfevaluatie)';
    document.getElementById('evTerug').href =
      `evaluatie-student.html?stage=${stage}&naam=${encodeURIComponent(naam)}&opleiding=${encodeURIComponent(opleiding)}`;

    const criteria = [
      {
        titel: 'LO5: Onderzoekende houding',
        omschr: 'De lerende professional hanteert een onderzoekende houding om tot innovatieve oplossingen te komen.',
        p5: 'De student hanteert een sterke onderzoekende houding. Informatie wordt kritisch geanalyseerd en verschillende oplossingen worden onderzocht en onderbouwd om tot een innovatieve oplossing te komen.',
        p3: 'De student onderzoekt mogelijke oplossingen en verzamelt relevante informatie, maar de analyse of onderbouwing kan verder worden verdiept.',
        p0: 'Er is weinig tot geen onderzoek uitgevoerd. Oplossingen worden niet onderbouwd of kritisch geëvalueerd.',
        score: '-'
      },
      {
        titel: 'LO6: Helder en transparant communiceren',
        omschr: 'De lerende professional communiceert helder en transparant in een professionele omgeving en/of in teamverband.',
        p5: 'De student communiceert helder, professioneel en transparant met alle betrokkenen. Informatie wordt correct gedeeld en afspraken worden duidelijk gecommuniceerd.',
        p3: 'De communicatie is meestal duidelijk en professioneel, maar sommige boodschappen of afspraken zijn onvolledig of minder duidelijk.',
        p0: 'Communicatie ontbreekt of is onduidelijk, waardoor samenwerking en informatie-uitwisseling bemoeilijkt worden.',
        score: '-'
      },
      {
        titel: 'LO7: Probleemoplossend vermogen',
        omschr: 'De lerende professional denkt kritisch na om problemen efficiënt en effectief op te lossen.',
        p5: 'De student analyseert problemen kritisch, identificeert de oorzaak en werkt efficiënte en doordachte oplossingen uit.',
        p3: 'De student lost problemen op, maar de analyse of gekozen oplossing kan verder worden verbeterd.',
        p0: 'Problemen worden niet of onvoldoende geanalyseerd en er worden geen geschikte oplossingen voorgesteld.',
        score: '-'
      },
      {
        titel: 'LO8: Persoonlijke ontwikkeling',
        omschr: 'De lerende professional ziet persoonlijke ontwikkeling als de basis voor professionele groei.',
        p5: 'De student reflecteert actief over zijn eigen functioneren, staat open voor feedback en gebruikt deze om zich professioneel verder te ontwikkelen.',
        p3: 'De student toont bereidheid om te leren en verwerkt feedback gedeeltelijk in zijn ontwikkeling.',
        p0: 'De student reflecteert niet over het eigen functioneren en toont weinig bereidheid om zich verder te ontwikkelen.',
        score: '-'
      },
      {
        titel: 'LO9: Professionele attitude',
        omschr: 'De lerende professional ontwikkelt een professionele attitude en handelt kwaliteitsvol.',
        p5: 'De student handelt steeds professioneel, neemt verantwoordelijkheid op, werkt kwaliteitsgericht en respecteert afspraken en deadlines.',
        p3: 'De student toont meestal een professionele houding, maar is niet altijd consequent in verantwoordelijkheid, kwaliteit of afspraken.',
        p0: 'De student toont onvoldoende professionele houding en respecteert afspraken, verantwoordelijkheden of kwaliteitsnormen niet.',
        score: '-'
      }
    ];

    const escape = (t) => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

    document.getElementById('evTabelBody').innerHTML = criteria.map(c => `
      <tr>
        <td class="col-crit"><span class="ev-crit-titel">${escape(c.titel)}</span><span class="ev-crit-omschr">${escape(c.omschr)}</span></td>
        <td>${escape(c.p5)}</td>
        <td>${escape(c.p3)}</td>
        <td>${escape(c.p0)}</td>
        <td class="col-score">${escape(c.score)}</td>
      </tr>`).join('');

    if (evaluatieId && token) {
      fetch(API_URL + '/api/evaluaties/' + evaluatieId + '/beoordelingen', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(r => r.json())
      .then(beoordelingen => {
        if (beoordelingen.length === 0) return;
        var tabelRijen = document.querySelectorAll('#evTabelBody tr');
        beoordelingen.forEach((b, i) => {
          if (tabelRijen[i] && b.student_score != null) {
            var scoreCel = tabelRijen[i].querySelector('.col-score');
            if (scoreCel) scoreCel.textContent = b.student_score + '/5';
          }
        });
        var beschrijving = document.querySelector('.ev-beschrijving');
        if (beschrijving && beoordelingen[0] && beoordelingen[0].student_reflectie) {
          beschrijving.value = beoordelingen[0].student_reflectie;
        }
      })
      .catch(() => {});
    }

    document.getElementById('evVolgende').addEventListener('click', () => {
      alert('Volgende stap van de eindevaluatie volgt nog.');
    });
  </script>
</body>
</html>
