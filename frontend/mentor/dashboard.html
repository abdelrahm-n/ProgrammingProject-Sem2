<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Dashboard</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
</head>

<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area mentor-dashboard">

        <section class="mentor-dashboard-header">
          <h1>Dashboard</h1>
          <p>Welkom terug! Hier zie je een overzicht van je studenten.</p>
        </section>

        <section class="mentor-dashboard-card">
          <h2>Mijn stagiairs</h2>

          <table class="mentor-dashboard-table">
            <thead>
              <tr>
                <th>Naam</th>
                <th>Laatste logboek</th>
              </tr>
            </thead>
            <tbody id="stagiairsTabel">
              <tr>
                <td colspan="2">Even laden...</td>
              </tr>
            </tbody>
          </table>
        </section>

        <section class="mentor-stats">
          <div class="mentor-stat-card">
            <h3>Totale studenten</h3>
            <p id="totaalStudenten">0</p>
          </div>

          <div class="mentor-stat-card mentor-stat-ok">
            <h3>In orde</h3>
            <p id="inOrde">0</p>
          </div>

          <div class="mentor-stat-card mentor-stat-alert">
            <h3>Actie vereist</h3>
            <p id="actieVereist">0</p>
          </div>
        </section>

      </main>
    </div>
  </div>



  <script src="../js/mentorDashboard.js"></script>
  <script src="../js/nav.js"></script>

</body>

</html>
