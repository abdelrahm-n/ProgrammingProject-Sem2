<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Dashboard</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
</head>

<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">

        <section class="page-header">
          <h1>Dashboard</h1>
          <p>Welkom terug! Hier zie je een overzicht van je studenten.</p>
        </section>

        <section class="student-card" id="wachtSectie" style="display:none;">
          <h2>Wacht op jouw handtekening</h2>
          <p>Deze studenten hebben de overeenkomst al ondertekend. Jij moet nu namens het bedrijf ondertekenen.</p>
          <div id="wachtLijst"></div>
        </section>

        <section class="student-card">
          <h2>Mijn stagiairs</h2>
          <div id="stagiairsLijst">
            <p>Even laden...</p>
          </div>
        </section>

      </main>
    </div>
  </div>



  <script src="../js/mentorDashboard.js"></script>
  <script src="../js/nav.js"></script>

</body>

</html>
