<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Dashboard</title>
  <link rel="stylesheet" href="../css/stijl.css?v=4" />
  <link rel="stylesheet" href="../css/mentor.css?v=4" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">

        <section class="page-header">
          <h1 id="mentorNaam">Dashboard</h1>
          <p>Welkom terug! Hier zie je een overzicht van je stagiairs.</p>
        </section>

        <section class="stats-grid">
          <div class="stat-card">
            <div class="stat-getal" id="totaalStudenten">0</div>
            <div class="stat-label">Stagiairs</div>
          </div>
          <div class="stat-card">
            <div class="stat-getal" id="evaluatiesCount">0</div>
            <div class="stat-label">Evaluaties</div>
          </div>
          <div class="stat-card">
            <div class="stat-getal" id="overeenkomstenCount">0</div>
            <div class="stat-label">Te ondertekenen</div>
          </div>
        </section>

        <section class="dashboard-card" style="margin-top: var(--sp-3);">
          <h2>Te ondertekenen</h2>
          <div id="overeenkomstenLijst"><p class="text-muted">Even laden...</p></div>
        </section>

        <section class="dashboard-card" style="margin-top: var(--sp-3);">
          <h2>Laatste logboeken</h2>
          <div id="logboekLijst"><p class="text-muted">Even laden...</p></div>
        </section>

        <section class="dashboard-card" style="margin-top: var(--sp-3);">
          <h2>Evaluaties</h2>
          <div id="evaluatiesLijst"><p class="text-muted">Even laden...</p></div>
        </section>

        <section class="dashboard-card" style="margin-top: var(--sp-3);">
          <h2>Mijn stagiairs</h2>
          <div id="stagiairsLijst"><p class="text-muted">Even laden...</p></div>
        </section>

      </main>
    </div>
  </div>

  <script src="../js/mentorDashboard.js?v=4"></script>
  <script src="../js/nav.js"></script>

</body>
</html>
