<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Evaluatie</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
  <style>
    /* Evaluatie-lijst (in de pagina zelf zodat de opmaak altijd werkt) */
    .eval-titel {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #111827;
      margin: 0 0 22px 0;
    }
    .eval-tabel {
      width: 100%;
      max-width: 900px;
      border-collapse: collapse;
    }
    .eval-tabel th {
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      padding: 0 16px 14px 0;
    }
    .eval-tabel td {
      padding: 18px 16px 18px 0;
      font-size: 16px;
      color: #111827;
      border-top: 1px solid #ececec;
    }
    .eval-evalueren {
      color: #111827;
      text-decoration: none;
      font-weight: 600;
    }
    .eval-evalueren:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="stagiairs.html" class="nav-item">Stagiairs</a>
        <a href="logboeken.html" class="nav-item">Logboeken</a>
        <a href="evaluatie.html" class="nav-item actief">Evaluatie</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">Uitloggen</a>
      </nav>

      <main class="content-area">
        <h2 class="eval-titel">Evaluatie</h2>

        <table class="eval-tabel">
          <thead>
            <tr>
              <th style="width:30%">Naam</th>
              <th style="width:45%">Richting</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Ryan Machiels</td>
              <td>Toegepaste Informatica</td>
              <td><a href="evaluatie-student.html?naam=Ryan%20Machiels&opleiding=Toegepaste%20Informatica" class="eval-evalueren">Evalueren</a></td>
            </tr>
            <tr>
              <td>Abdelrahman</td>
              <td>Toegepaste Informatica</td>
              <td><a href="evaluatie-student.html?naam=Abdelrahman&opleiding=Toegepaste%20Informatica" class="eval-evalueren">Evalueren</a></td>
            </tr>
            <tr>
              <td>Iman Obenali</td>
              <td>Toegepaste Informatica</td>
              <td><a href="evaluatie-student.html?naam=Iman%20Obenali&opleiding=Toegepaste%20Informatica" class="eval-evalueren">Evalueren</a></td>
            </tr>
            <tr>
              <td>Ranya Rabib</td>
              <td>Toegepaste Informatica</td>
              <td><a href="evaluatie-student.html?naam=Ranya%20Rabib&opleiding=Toegepaste%20Informatica" class="eval-evalueren">Evalueren</a></td>
            </tr>
          </tbody>
        </table>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
</body>
</html>
