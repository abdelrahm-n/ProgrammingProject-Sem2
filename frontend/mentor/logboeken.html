<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Logboeken</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
  <link rel="stylesheet" href="../css/button.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='dashboard.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <section class="dashboard-card">
          <h1>Logboek overzicht</h1>
          <p>Overzicht van de logboeken van je stagiairs.</p>
        </section>

        <section class="dashboard-card" id="lijst-card">
          <h2>Wacht op jouw actie</h2>
          <div id="actiefLijst"></div>
        </section>

        <section class="dashboard-card" id="afgerond-card">
          <h2>Afgerond</h2>
          <div id="afgerondLijst"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const actiefLijst = document.getElementById('actiefLijst');
    const afgerondLijst = document.getElementById('afgerondLijst');

    function escape(t){ if(t==null) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    function bouwTabel(data) {
      var html = '<table><thead><tr>';
      html += '<th>Naam</th><th>Richting</th><th>Logboek</th><th>Actie</th>';
      html += '</tr></thead><tbody>';

      data.forEach(function(s) {
        var naam = escape(s.voornaam + ' ' + s.achternaam);
        var ingevuld = Math.ceil(Number(s.aantal_dagen_ingevuld || 0) / 5);
        var totaal = Number(s.totaal_weken || 0);
        var isVolledig = ingevuld >= totaal && totaal > 0;
        var badgeClass = isVolledig ? 'badge badge--goedgekeurd' : 'badge badge--actief';
        var tekst = isVolledig ? 'Volledig' : ingevuld + '/' + totaal + ' weken';

        html += '<tr>';
        html += '<td><strong>' + naam + '</strong></td>';
        html += '<td>' + (escape(s.opleiding) || '-') + '</td>';
        html += '<td><span class="' + badgeClass + '">' + tekst + '</span></td>';
        html += '<td><a href="logboek-detail.html?student=' + s.student_id + '" class="btn btn--primair btn--sm">Bekijk</a></td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      return html;
    }

    async function laadLijst() {
      var studenten, dashboardData;

      try {
        var res1 = await fetch(API_URL + '/api/logboeken/studenten', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res1.ok) throw new Error('niet ok');
        studenten = await res1.json();
      } catch (e) {
        actiefLijst.innerHTML = '<p>Kon studenten niet laden.</p>';
        return;
      }

      try {
        var res2 = await fetch(API_URL + '/api/mentor/dashboard', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res2.ok) dashboardData = await res2.json();
      } catch (e) {}

      if (!studenten.length) {
        actiefLijst.innerHTML = '<p>Je hebt nog geen toegewezen stagiairs.</p>';
        return;
      }

      var statusMap = {};
      if (dashboardData && dashboardData.studenten) {
        dashboardData.studenten.forEach(function(s) {
          statusMap[s.student_id] = s.logboek_status || null;
        });
      }

      var actief = [];
      var afgerond = [];

      studenten.forEach(function(s) {
        var status = statusMap[s.student_id];
        if (status === 'goedgekeurd') {
          afgerond.push(s);
        } else {
          actief.push(s);
        }
      });

      actiefLijst.innerHTML = actief.length > 0 ? bouwTabel(actief) : '<p>Geen studenten waar je logboeken van moet beoordelen.</p>';
      afgerondLijst.innerHTML = afgerond.length > 0 ? bouwTabel(afgerond) : '<p>Geen afgeronde logboeken.</p>';
    }

    laadLijst();
  </script>
</body>
</html>
