<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Logboeken</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <div class="logboek-student-card">
          <div class="page-header">
            <h2>LOGBOEK STUDENT</h2>
          </div>

          <div class="mentor-logboeken-list" id="studentenLijst">
            <div class="row-headings">
              <span>Naam</span>
              <span>Richting</span>
              <span>Status</span>
              <span></span>
            </div>
            <!-- Rijen via JavaScript -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const lijst = document.getElementById('studentenLijst');

    function escape(t){ if(t==null) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    (async function () {
      let studenten;
      try {
        const res = await fetch(API_URL + '/api/logboeken/studenten', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        studenten = await res.json();
      } catch (e) {
        lijst.insertAdjacentHTML('beforeend',
          '<div class="week-status-item status-action">Kon studenten niet laden. Log opnieuw in via de startpagina.</div>');
        return;
      }

      if (!studenten.length) {
        lijst.insertAdjacentHTML('beforeend',
          '<div class="week-status-item">Je hebt nog geen toegewezen stagiairs.</div>');
        return;
      }

      studenten.forEach(s => {
        const actie = Number(s.aantal_ingediend) > 0;
        const klasse = actie ? 'status-action' : 'status-approved';
        const tekst = actie ? 'Actie vereist' : 'Goedgekeurd';
        const naam = escape(s.voornaam + ' ' + s.achternaam);
        const rij = document.createElement('a');
        rij.href = 'logboek-detail.html?student=' + s.student_id;
        rij.className = 'row-item ' + klasse + ' clickable-row';
        rij.innerHTML = `
          <span>${naam}</span>
          <span>${escape(s.opleiding) || '-'}</span>
          <span class="status-text">${tekst}</span>
          <span class="details-link">Bekijken</span>`;
        lijst.appendChild(rij);
      });
    })();
  </script>
</body>
</html>
