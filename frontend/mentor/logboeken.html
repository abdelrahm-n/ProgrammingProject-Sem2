<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Logboeken</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
  <link rel="stylesheet" href="../css/button.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='dashboard.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <section class="dashboard-card">
          <h1>Logboek overzicht</h1>
          <p>Overzicht van de logboeken van je stagiairs.</p>
        </section>

        <section class="dashboard-card" id="lijst-card">
          <h2>Wacht op jouw actie</h2>
          <div id="actiefLijst"></div>
        </section>

        <section class="dashboard-card" id="afgerond-card">
          <h2>Alle logboeken</h2>
          <div id="afgerondLijst"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const actiefLijst = document.getElementById('actiefLijst');
    const afgerondLijst = document.getElementById('afgerondLijst');

    function escape(t){ if(t==null) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    function bouwTabel(data, toonStatus) {
      var html = '<table><thead><tr>';
      html += '<th>Naam</th><th>Richting</th><th>Week</th>';
      if (toonStatus) html += '<th>Status</th>';
      html += '<th>Actie</th>';
      html += '</tr></thead><tbody>';

      data.forEach(function(l) {
        var naam = escape(l.studentNaam || (l.voornaam + ' ' + l.achternaam));

        var statusBadge = '';
        if (l.status === 'goedgekeurd') statusBadge = '<span class="badge badge--goedgekeurd">Goedgekeurd</span>';
        else if (l.status === 'ingediend') statusBadge = '<span class="badge badge--ingediend">Ingediend</span>';
        else statusBadge = '<span class="badge">' + escape(l.status) + '</span>';

        html += '<tr>';
        html += '<td><strong>' + naam + '</strong></td>';
        html += '<td>' + (escape(l.opleiding) || '-') + '</td>';
        html += '<td>Week ' + escape(l.week_nummer) + '</td>';
        if (toonStatus) html += '<td>' + statusBadge + '</td>';
        html += '<td><a href="logboek-detail.html?student=' + (l.student_id || l.studentId) + '" class="btn btn--primair btn--sm">Bekijk</a></td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      return html;
    }

    async function laadLijst() {
      var dashboardData;

      try {
        var res = await fetch(API_URL + '/api/mentor/dashboard', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        dashboardData = await res.json();
      } catch (e) {
        actiefLijst.innerHTML = '<p>Kon gegevens niet laden.</p>';
        return;
      }

      var studenten = dashboardData.studenten || [];

      if (!studenten.length) {
        actiefLijst.innerHTML = '<p>Je hebt nog geen toegewezen stagiairs.</p>';
        return;
      }

      var alleLogboeken = [];

      for (var i = 0; i < studenten.length; i++) {
        var s = studenten[i];
        if (!s.stage_id) continue;

        try {
          var res2 = await fetch(API_URL + '/api/mentor/logboeken/' + s.stage_id, {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (!res2.ok) continue;
          var weken = await res2.json();
        } catch (e) { continue; }

        weken.forEach(function(w) {
          alleLogboeken.push({
            student_id: s.student_id,
            studentNaam: s.voornaam + ' ' + s.achternaam,
            opleiding: s.opleiding,
            week_nummer: w.week_nummer,
            status: w.status_naam
          });
        });
      }

      alleLogboeken.reverse();

      var wachtend = [];
      var alle = [];

      alleLogboeken.forEach(function(l) {
        alle.push(l);
        if (l.status === 'ingediend') {
          wachtend.push(l);
        }
      });

      actiefLijst.innerHTML = wachtend.length > 0 ? bouwTabel(wachtend, true) : '<p>Geen logboeken die op je beoordeling wachten.</p>';
      afgerondLijst.innerHTML = alle.length > 0 ? bouwTabel(alle, true) : '<p>Nog geen logboeken ingevuld.</p>';
    }

    laadLijst();
  </script>
</body>
</html>
