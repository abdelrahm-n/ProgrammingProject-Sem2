<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Stageplatform - Mentor - Stagiair detail</title>

  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
</head>

<body>
<div id="app">

  <header class="header">
    <div class="header-logo">
      <span class="header-logo-text">Stageplatform</span>
    </div>

    <div class="header-actions">
      <span class="header-rol-badge">Stagementor</span>
      <button class="btn-terug" onclick="window.location.href='stagiairs.html'">
        Terug
      </button>
    </div>
  </header>

  <div class="app-body">

    <nav class="sidebar"></nav>

    <main class="content-area">

      <section class="page-header">
        <h1>Stagiair detail</h1>
        <p>Bekijk de gegevens van de student en de gekoppelde stage.</p>
      </section>

      <section class="student-card">
        <h2>Studentgegevens</h2>
        <div class="contract-info">
          <p><strong>Naam:</strong> <span id="studentNaam"></span></p>
          <p><strong>Studentnummer:</strong> <span id="studentnummer"></span></p>
          <p><strong>Opleiding:</strong> <span id="opleiding"></span></p>
          <p><strong>E-mail:</strong> <span id="email"></span></p>
        </div>
      </section>

      <section class="student-card">
        <h2>Stagegegevens</h2>
        <div class="contract-info">
          <p><strong>Stagebedrijf:</strong> <span id="bedrijfNaam"></span></p>
          <p><strong>Stageperiode:</strong> <span id="stageperiode"></span></p>
          <p><strong>Stageopdracht:</strong> <span id="stageopdracht"></span></p>
        </div>
      </section>

      <section class="student-card" id="overeenkomstSectie">
        <h2>Stageovereenkomst</h2>
        <p id="overeenkomstTekst"></p>
        <a id="stageovereenkomstLink" href="#" class="btn-primary" style="display:none;">
          Stageovereenkomst bekijken
        </a>
      </section>

    </main>
  </div>
</div>

<script>
const API_URL = 'http://localhost:3000';
const token = localStorage.getItem('token');

if (!token) {
  window.location.href = '../index.html';
}

const params = new URLSearchParams(window.location.search);
const overeenkomstId = params.get('id');

function zet(id, waarde) {
  var veld = document.getElementById(id);
  if (veld) veld.textContent = waarde || '-';
}

async function laadDetail() {
  if (!overeenkomstId) {
    alert('Geen overeenkomst ID gevonden.');
    return;
  }

  try {
    var resp = await fetch(API_URL + '/api/mentor/overeenkomst/' + overeenkomstId, {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (resp.status === 401) {
      window.location.href = '../index.html';
      return;
    }

    if (!resp.ok) {
      alert('Overeenkomst niet gevonden.');
      return;
    }

    var data = await resp.json();

    zet('studentNaam', data.student_voornaam + ' ' + data.student_achternaam);
    zet('studentnummer', data.studentnummer);
    zet('opleiding', data.opleiding);
    zet('email', data.student_email);
    zet('bedrijfNaam', data.bedrijf_naam);
    zet('stageperiode', new Date(data.startdatum).toLocaleDateString('nl-BE') + ' - ' + new Date(data.einddatum).toLocaleDateString('nl-BE'));
    zet('stageopdracht', data.omschrijving_opdracht);

    var link = document.getElementById('stageovereenkomstLink');
    var tekst = document.getElementById('overeenkomstTekst');

    if (data.getekend_door_bedrijf) {
      tekst.textContent = 'Deze overeenkomst is al ondertekend door het bedrijf.';
      link.style.display = 'none';
    } else if (data.getekend_door_student) {
      tekst.textContent = 'De student heeft de overeenkomst al ondertekend. Jij moet nu namens het bedrijf ondertekenen.';
      link.href = 'stageovereenkomst.html?id=' + overeenkomstId;
      link.style.display = 'inline-block';
    } else {
      tekst.textContent = 'De student heeft de overeenkomst nog niet ondertekend.';
      link.style.display = 'none';
    }
  } catch (err) {
    console.error('Fout bij laden detail:', err);
  }
}

laadDetail();
</script>
<script src="../js/nav.js"></script>
</body>
</html>
