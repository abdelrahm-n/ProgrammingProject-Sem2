<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Stageplatform - Mentor - Stagiairs</title>

  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
</head>

<body>
<div id="app">

  <header class="header">
    <div class="header-logo">
      <span class="header-logo-text">Stageplatform</span>
    </div>

    <div class="header-actions">
      <span class="header-rol-badge">Stagementor</span>
      <button class="btn-terug" onclick="window.location.href='dashboard.html'">Terug</button>
    </div>
  </header>

  <div class="app-body">

    <nav class="sidebar">
      <a href="dashboard.html" class="nav-item">Dashboard</a>
      <a href="stagiairs.html" class="nav-item actief">Stagiairs</a>
      <a href="logboeken.html" class="nav-item">Logboeken</a>
      <a href="evaluatie.html" class="nav-item">Evaluatie</a>
      <a href="profiel.html" class="nav-item">Profiel</a>
      <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Uitloggen
      </a>
    </nav>

    <main class="content-area">

      <section class="page-header">
        <h1>Mijn stagiairs</h1>
        <p>Overzicht van alle studenten die aan jou gekoppeld zijn.</p>
      </section>

      <section class="student-card">
        <h2>Alle stagiairs</h2>

        <div id="stagiairsLijst">
          <p>Even laden...</p>
        </div>
      </section>

    </main>
  </div>
</div>

<script>
const API_URL = 'http://localhost:3000';
const token = localStorage.getItem('token');

if (!token) {
  window.location.href = '../index.html';
}

async function laadStagiairs() {
  try {
    const resp = await fetch(API_URL + '/api/mentor/alle-stagiairs', {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (resp.status === 401) {
      window.location.href = '../index.html';
      return;
    }

    const data = await resp.json();
    const container = document.getElementById('stagiairsLijst');

    if (!data || data.length === 0) {
      container.innerHTML = '<p>Je hebt nog geen stagiairs.</p>';
      return;
    }

    let html = '<table><thead><tr>';
    html += '<th>Student</th><th>Bedrijf</th><th>Periode</th><th>Overeenkomst</th><th>Actie</th>';
    html += '</tr></thead><tbody>';

    data.forEach(function(o) {
      var naam = o.student_voornaam + ' ' + o.student_achternaam;
      var periode = '';
      if (o.startdatum && o.einddatum) {
        periode = new Date(o.startdatum).toLocaleDateString('nl-BE') + ' - ' + new Date(o.einddatum).toLocaleDateString('nl-BE');
      }

      var osBadge = '';
      if (o.overeenkomst_status === 'wacht_op_handtekeningen') osBadge = '<span class="badge badge--ingediend">Wachtend</span>';
      else if (o.overeenkomst_status === 'volledig_getekend') osBadge = '<span class="badge badge--goedgekeurd">Getekend</span>';
      else if (o.overeenkomst_status === 'gevalideerd') osBadge = '<span class="badge badge--actief">Gevalideerd</span>';
      else osBadge = '<span class="badge">' + o.overeenkomst_status + '</span>';

      var actieLink = '<a href="stagiair-detail.html?id=' + o.overeenkomst_id + '" class="btn btn--primair btn--sm">Bekijk</a>';

      html += '<tr>';
      html += '<td><strong>' + naam + '</strong><br><small>' + (o.studentnummer || '') + '</small></td>';
      html += '<td>' + (o.bedrijf_naam || '-') + '</td>';
      html += '<td>' + periode + '</td>';
      html += '<td>' + osBadge + '</td>';
      html += '<td>' + actieLink + '</td>';
      html += '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  } catch (err) {
    document.getElementById('stagiairsLijst').innerHTML = '<p>Fout bij laden.</p>';
  }
}

laadStagiairs();
</script>
<script src="../js/nav.js"></script>
</body>
</html>
