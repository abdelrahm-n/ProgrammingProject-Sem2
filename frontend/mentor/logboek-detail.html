<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Logboek Detail</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="stagiairs.html" class="nav-item">Stagiairs</a>
        <a href="logboeken.html" class="nav-item actief">Logboeken</a>
        <a href="evaluatie.html" class="nav-item">Evaluatie</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">Uitloggen</a>
      </nav>

      <main class="content-area">
        <div class="logboek-student-card">
          <div class="page-header">
            <h2>LOGBOEK STUDENT</h2>
          </div>

          <div class="student-summary">
            <div class="student-summary-name-block">
              <div class="student-name" id="studentName">Ryan Machiels</div>
              <div class="student-year">1ste jaar</div>
            </div>
            <div class="student-study">Toegepaste Informatica</div>
          </div>

          <div class="week-status-list" id="weekStatusList">
            <div class="week-status-item status-approved">logboek week 1 - <span class="status-text">goedgekeurd</span></div>
            <div class="week-status-item status-approved">logboek week 2 - <span class="status-text">goedgekeurd</span></div>
            <div class="week-status-item status-action"><a href="logboek-week.html?student=ryan&week=3" class="status-link">logboek week 3 - <span class="status-text">actie vereist</span></a></div>
            <div class="week-status-item status-unavailable">logboek week 4 - <span class="status-text">nog niet beschikbaar</span></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const student = params.get('student') || 'ryan';

      const namen = {
        ryan: 'Ryan Machiels',
        abdelrahman: 'Abdelrahman',
        iman: 'Iman Obenali',
        ranya: 'Ranya Rabib'
      };

      const nameEl = document.getElementById('studentName');
      if (nameEl && namen[student]) {
        nameEl.textContent = namen[student];
      }

      // Zorg dat de weeklinks de juiste student meegeven
      document.querySelectorAll('#weekStatusList .status-link').forEach(link => {
        const url = new URL(link.getAttribute('href'), window.location.href);
        url.searchParams.set('student', student);
        link.setAttribute('href', url.pathname.split('/').pop() + url.search);
      });
    })();
  </script>
</body>
</html>
