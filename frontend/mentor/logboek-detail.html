<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Logboek Detail</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
  <link rel="stylesheet" href="../css/logboeken.css" />
</head>

<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='logboeken.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <div class="logboeken-panel">
          <div class="logboeken-header">
            <h1 id="studentName">Student</h1>
            <div class="progress-info">
              <div class="progress-item">
                <span class="progress-label">Richting</span>
                <span class="progress-value" id="studentStudy">-</span>
              </div>
              <div class="progress-item">
                <span class="progress-label">Bedrijf</span>
                <span class="progress-value" id="studentBedrijf">-</span>
              </div>
            </div>
          </div>

          <div class="logboeken-table-container">
            <table class="student-logboeken-table">
              <thead>
                <tr>
                  <th>Week</th>
                  <th>Logboeken</th>
                  <th>Status</th>
                  <th>Mentorfeedback</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody id="weekBody">
                <tr>
                  <td colspan="5">Laden...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('studentId') || params.get('student');
    const body = document.getElementById('weekBody');

    function escape(t) { if (t == null) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    const statusInfo = {
      goedgekeurd: { klasse: 'badge badge--goedgekeurd', tekst: 'Goedgekeurd' },
      ingediend: { klasse: 'badge badge--actief', tekst: 'Ingediend' },
      open: { klasse: 'badge badge--actief', tekst: 'Ingediend' }
    };

    (async function () {
      let data;
      try {
        const res = await fetch(API_URL + '/api/logboeken/student/' + studentId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        data = await res.json();
      } catch (e) {
        body.innerHTML = '<tr><td colspan="5">Kon logboek niet laden.</td></tr>';
        return;
      }

      if (data.student) {
        document.getElementById('studentName').textContent = data.student.voornaam + ' ' + data.student.achternaam;
        document.getElementById('studentStudy').textContent = data.student.opleiding || '-';
      }
      if (data.stage) {
        document.getElementById('studentBedrijf').textContent = data.stage.bedrijf || '-';
      }

      const weken = data.weken || [];
      if (!weken.length) {
        body.innerHTML = '<tr><td colspan="5">Nog geen logboeken ingevuld.</td></tr>';
        return;
      }

      const dagenPerWeek = 5;
      weken.reverse();
      body.innerHTML = '';
      weken.forEach(week => {
        const info = statusInfo[week.status] || statusInfo.open;
        const weekUniek = week.dagen ? [...new Set(week.dagen.map(d => d.datum))].length : 0;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="week-badge">Week ${week.week_nummer}</span></td>
          <td>${weekUniek} / ${dagenPerWeek}</td>
          <td><span class="${info.klasse}">${info.tekst}</span></td>
          <td><span class="feedback-text">${escape(week.feedback_mentor) || '-'}</span></td>
          <td><a class="details-link" href="logboek-week.html?student=${studentId}&week=${week.id}">Bekijken</a></td>`;
        body.appendChild(tr);
      });
    })();
  </script>
</body>

</html>
