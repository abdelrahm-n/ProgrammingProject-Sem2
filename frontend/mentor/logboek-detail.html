<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Logboek Detail</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="stagiairs.html" class="nav-item">Stagiairs</a>
        <a href="logboeken.html" class="nav-item actief">Logboeken</a>
        <a href="evaluatie.html" class="nav-item">Evaluatie</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">Uitloggen</a>
      </nav>

      <main class="content-area">
        <div class="logboek-student-card">
          <div class="page-header">
            <h2>LOGBOEK STUDENT</h2>
          </div>

          <div class="student-summary">
            <div class="student-summary-name-block">
              <div class="student-name" id="studentName">Student</div>
              <div class="student-year" id="studentBedrijf"></div>
            </div>
            <div class="student-study" id="studentStudy"></div>
          </div>

          <div class="week-status-list" id="weekStatusList">
            <!-- Weken via JavaScript -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('student');
    const lijst = document.getElementById('weekStatusList');

    function escape(t){ if(t==null) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    // status uit db -> weergave
    const statusInfo = {
      goedgekeurd: { klasse: 'status-approved',    tekst: 'goedgekeurd' },
      ingediend:   { klasse: 'status-action',      tekst: 'actie vereist' },
      open:        { klasse: 'status-unavailable', tekst: 'in bewerking' }
    };

    (async function () {
      let data;
      try {
        const res = await fetch(API_URL + '/api/logboeken/student/' + studentId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        data = await res.json();
      } catch (e) {
        lijst.innerHTML = '<div class="week-status-item status-action">Kon logboek niet laden.</div>';
        return;
      }

      if (data.student) {
        document.getElementById('studentName').textContent = data.student.voornaam + ' ' + data.student.achternaam;
        document.getElementById('studentStudy').textContent = data.student.opleiding || '';
      }
      if (data.stage) {
        document.getElementById('studentBedrijf').textContent = data.stage.bedrijf || '';
      }

      const weken = data.weken || [];
      if (!weken.length) {
        lijst.innerHTML = '<div class="week-status-item status-unavailable">Nog geen logboeken ingevuld.</div>';
        return;
      }

      weken.forEach(w => {
        const info = statusInfo[w.status] || statusInfo.open;
        const item = document.createElement('div');
        item.className = 'week-status-item ' + info.klasse;
        item.innerHTML = `<a href="logboek-week.html?student=${studentId}&week=${w.id}" class="status-link">logboek week ${w.week_nummer} - <span class="status-text">${info.tekst}</span></a>`;
        lijst.appendChild(item);
      });
    })();
  </script>
</body>
</html>
