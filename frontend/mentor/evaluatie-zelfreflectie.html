<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Zelfreflectie student</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
  <style>
    .zr-titel { font-size: 22px; font-weight: 800; margin: 0 0 4px 0; color: #111827; }
    .zr-sub { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #6b7280; margin: 0 0 18px 0; }
    .zr-kaart { background: #fff; border: 1px solid #d8d8d8; border-radius: 8px; padding: 18px; margin-bottom: 32px; }

    .zr-tabel { width: 100%; border-collapse: collapse; }
    .zr-tabel th, .zr-tabel td {
      text-align: left; vertical-align: top; padding: 12px;
      border-bottom: 1px solid #ececec; font-size: 14px; line-height: 1.5;
    }
    .zr-tabel th { font-size: 12px; font-weight: 700; color: #374151; background: #fafafa; }
    .zr-tabel .col-score { width: 120px; text-align: center; font-weight: 800; font-size: 16px; }

    .zr-reflectie-titel { font-size: 22px; font-weight: 800; margin: 0 0 18px 0; }
    .zr-reflectie-item { margin-bottom: 20px; }
    .zr-reflectie-vraag { font-size: 14px; font-weight: 700; margin: 0 0 6px 0; color: #111827; }
    .zr-reflectie-tekst {
      width: 100%; min-height: 70px; padding: 10px 12px; border: 1px solid #d8d8d8;
      border-radius: 6px; background: #f9f9f9; font-family: inherit; font-size: 14px; color: #111827; line-height: 1.5;
    }
    .zr-acties { display: flex; justify-content: flex-end; margin-top: 8px; }
    .zr-terug {
      background: #6b7280; color: #fff; border: none; padding: 10px 26px;
      border-radius: 999px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 14px;
    }
    .zr-terug:hover { background: #4b5563; }
    .zr-leeg { color: #6b7280; font-size: 15px; }
  </style>
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <h2 class="zr-titel" id="zrTitel">Zelfevaluatie</h2>
        <p class="zr-sub">INGEVULD DOOR STUDENT</p>

        <div id="inhoud">
          <p class="zr-leeg">Laden...</p>
        </div>

        <div class="zr-acties">
          <a href="#" id="zrTerug" class="zr-terug">Terug</a>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const params = new URLSearchParams(window.location.search);
    const stage = params.get('stage');
    const naam = params.get('naam') || 'Student';
    const opleiding = params.get('opleiding') || '';
    const type = params.get('type') || 'tussentijds';
    const voornaam = naam.split(' ')[0];

    const typeNaam = type === 'eind' ? 'eindevaluatie' : 'tussentijdse_evaluatie';
    document.getElementById('zrTitel').textContent = 'Zelfevaluatie ' + voornaam.toUpperCase();
    document.getElementById('zrTerug').href =
      `evaluatie-student.html?stage=${stage}&naam=${encodeURIComponent(naam)}&opleiding=${encodeURIComponent(opleiding)}`;

    const inhoud = document.getElementById('inhoud');
    const escape = (t) => { if (t == null) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

    (async function () {
      if (!token) { inhoud.innerHTML = '<p class="zr-leeg">Niet ingelogd. Log opnieuw in als stagementor.</p>'; return; }

      let momenten;
      try {
        const res = await fetch(API_URL + '/api/evaluaties/stage/' + stage, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        momenten = await res.json();
      } catch (e) {
        inhoud.innerHTML = '<p class="zr-leeg">Kon de evaluatie niet laden.</p>';
        return;
      }

      const moment = (momenten || []).find(m => m.type_naam === typeNaam);
      if (!moment) {
        inhoud.innerHTML = `<p class="zr-leeg">Er is nog geen ${type === 'eind' ? 'eindevaluatie' : 'tussentijdse evaluatie'} voor deze student.</p>`;
        return;
      }

      const resB = await fetch(API_URL + '/api/evaluaties/' + moment.id + '/beoordelingen', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const beoordelingen = await resB.json();

      const ingevuld = beoordelingen.filter(b => b.student_score != null || (b.student_reflectie && b.student_reflectie.trim()));
      if (!ingevuld.length) {
        inhoud.innerHTML = '<p class="zr-leeg">De student heeft nog geen zelfreflectie ingediend.</p>';
        return;
      }

      // Scoretabel
      const rijen = beoordelingen.map(b => `
        <tr>
          <td><strong>${escape(b.competentie_naam)}</strong></td>
          <td class="col-score">${b.student_score != null ? b.student_score + '/5' : '-'}</td>
        </tr>`).join('');

      // Reflecties
      const reflecties = beoordelingen.map(b => `
        <div class="zr-reflectie-item">
          <p class="zr-reflectie-vraag">${escape(b.competentie_naam)}</p>
          <div class="zr-reflectie-tekst">${b.student_reflectie ? escape(b.student_reflectie) : '<span style="color:#9ca3af">(niet ingevuld)</span>'}</div>
        </div>`).join('');

      inhoud.innerHTML = `
        <div class="zr-kaart">
          <table class="zr-tabel">
            <thead><tr><th>Criterium</th><th class="col-score">Zelfscore</th></tr></thead>
            <tbody>${rijen}</tbody>
          </table>
        </div>
        <h2 class="zr-reflectie-titel">Zelfreflectie ${escape(voornaam)}</h2>
        ${reflecties}`;
    })();
  </script>
</body>
</html>
