<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagementor - Zelfreflectie student</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/mentor.css" />
  <style>
    .zr-titel { font-size: 22px; font-weight: 800; margin: 0 0 4px 0; color: #111827; }
    .zr-sub { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: #6b7280; margin: 0 0 18px 0; }
    .zr-kaart { background: #fff; border: 1px solid #d8d8d8; border-radius: 8px; padding: 18px; margin-bottom: 32px; }

    .zr-tabel { width: 100%; border-collapse: collapse; }
    .zr-tabel th, .zr-tabel td {
      text-align: left; vertical-align: top; padding: 12px 12px;
      border-bottom: 1px solid #ececec; font-size: 12.5px; line-height: 1.5;
    }
    .zr-tabel th { font-size: 12px; font-weight: 700; color: #374151; background: #fafafa; }
    .zr-tabel .col-criterium { width: 20%; }
    .zr-tabel .col-score { width: 9%; text-align: center; font-weight: 800; font-size: 15px; }
    .zr-crit-titel { font-weight: 700; display: block; margin-bottom: 4px; }
    .zr-crit-omschr { color: #6b7280; }

    .zr-reflectie-titel { font-size: 22px; font-weight: 800; margin: 0 0 18px 0; }
    .zr-reflectie-item { margin-bottom: 20px; }
    .zr-reflectie-vraag { font-size: 13px; font-weight: 600; margin: 0 0 6px 0; color: #111827; }
    .zr-reflectie-vraag .nr { color: #6b7280; }
    .zr-reflectie-tekst {
      width: 100%; min-height: 56px; padding: 10px 12px; border: 1px solid #d8d8d8;
      border-radius: 6px; background: #f9f9f9; font-family: inherit; font-size: 14px; color: #111827;
    }
    .zr-acties { display: flex; justify-content: flex-end; margin-top: 8px; }
    .zr-terug {
      background: #6b7280; color: #fff; border: none; padding: 10px 26px;
      border-radius: 999px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 14px;
    }
    .zr-terug:hover { background: #4b5563; }
  </style>
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagementor</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="stagiairs.html" class="nav-item">Stagiairs</a>
        <a href="logboeken.html" class="nav-item">Logboeken</a>
        <a href="evaluatie.html" class="nav-item actief">Evaluatie</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">Uitloggen</a>
      </nav>

      <main class="content-area">
        <h2 class="zr-titel" id="zrTitel">Zelfevaluatie</h2>
        <p class="zr-sub">INGEVULD DOOR STUDENT</p>

        <div class="zr-kaart">
          <table class="zr-tabel">
            <thead>
              <tr>
                <th class="col-criterium">Criterium</th>
                <th>5 punten - Volledige score</th>
                <th>3 punten - Goede score</th>
                <th>0 punten - Geen score</th>
                <th class="col-score">Score</th>
              </tr>
            </thead>
            <tbody id="zrTabelBody"></tbody>
          </table>
        </div>

        <h2 class="zr-reflectie-titel" id="zrReflectieTitel">Zelfreflectie</h2>
        <div id="zrReflectie"></div>

        <div class="zr-acties">
          <a href="#" id="zrTerug" class="zr-terug">Terug</a>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const naam = params.get('naam') || 'Student';
    const opleiding = params.get('opleiding') || '';
    const voornaam = naam.split(' ')[0];

    document.getElementById('zrTitel').textContent = 'Zelfevaluatie ' + voornaam.toUpperCase();
    document.getElementById('zrReflectieTitel').textContent = 'Zelfreflectie ' + voornaam;
    document.getElementById('zrTerug').href =
      `evaluatie-student.html?naam=${encodeURIComponent(naam)}&opleiding=${encodeURIComponent(opleiding)}`;

    // Rubriek + door de student gekozen score (zoals de mockup)
    const criteria = [
      {
        titel: 'LO5: Onderzoekende houding',
        omschr: 'De lerende professional hanteert een onderzoekende houding om tot innovatieve oplossingen te komen.',
        p5: 'De student hanteert een sterke onderzoekende houding. Informatie wordt kritisch geanalyseerd en verschillende oplossingen worden onderzocht en onderbouwd om tot een innovatieve oplossing te komen.',
        p3: 'De student onderzoekt mogelijke oplossingen en verzamelt relevante informatie, maar de analyse of onderbouwing kan verder worden verdiept.',
        p0: 'Er is weinig tot geen onderzoek uitgevoerd. Oplossingen worden niet onderbouwd of kritisch geëvalueerd.',
        score: '3/5'
      },
      {
        titel: 'LO6: Helder en transparant communiceren',
        omschr: 'De lerende professional communiceert helder en transparant in een professionele omgeving en/of in teamverband.',
        p5: 'De student communiceert helder, professioneel en transparant met alle betrokkenen. Informatie wordt correct gedeeld en afspraken worden duidelijk gecommuniceerd.',
        p3: 'De communicatie is meestal duidelijk en professioneel, maar sommige boodschappen of afspraken zijn onvolledig of minder duidelijk.',
        p0: 'Communicatie ontbreekt of is onduidelijk, waardoor samenwerking en informatie-uitwisseling bemoeilijkt worden.',
        score: '2/5'
      },
      {
        titel: 'LO7: Probleemoplossend vermogen',
        omschr: 'De lerende professional denkt kritisch na om problemen efficiënt en effectief op te lossen.',
        p5: 'De student analyseert problemen kritisch, identificeert de oorzaak en werkt efficiënte en doordachte oplossingen uit.',
        p3: 'De student lost problemen op, maar de analyse of gekozen oplossing kan verder worden verbeterd.',
        p0: 'Problemen worden niet of onvoldoende geanalyseerd en er worden geen geschikte oplossingen voorgesteld.',
        score: '1/5'
      },
      {
        titel: 'LO8: Persoonlijke ontwikkeling',
        omschr: 'De lerende professional ziet persoonlijke ontwikkeling als de basis voor professionele groei.',
        p5: 'De student reflecteert actief over zijn eigen functioneren, staat open voor feedback en gebruikt deze om zich professioneel verder te ontwikkelen.',
        p3: 'De student toont bereidheid om te leren en verwerkt feedback gedeeltelijk in zijn ontwikkeling.',
        p0: 'De student reflecteert niet over het eigen functioneren en toont weinig bereidheid om zich verder te ontwikkelen.',
        score: '5/5'
      },
      {
        titel: 'LO9: Professionele attitude',
        omschr: 'De lerende professional ontwikkelt een professionele attitude en handelt kwaliteitsvol.',
        p5: 'De student handelt steeds professioneel, neemt verantwoordelijkheid op, werkt kwaliteitsgericht en respecteert afspraken en deadlines.',
        p3: 'De student toont meestal een professionele houding, maar is niet altijd consequent in verantwoordelijkheid, kwaliteit of afspraken.',
        p0: 'De student toont onvoldoende professionele houding en respecteert afspraken, verantwoordelijkheden of kwaliteitsnormen niet.',
        score: '4/5'
      }
    ];

    const escape = (t) => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

    document.getElementById('zrTabelBody').innerHTML = criteria.map(c => `
      <tr>
        <td class="col-criterium"><span class="zr-crit-titel">${escape(c.titel)}</span><span class="zr-crit-omschr">${escape(c.omschr)}</span></td>
        <td>${escape(c.p5)}</td>
        <td>${escape(c.p3)}</td>
        <td>${escape(c.p0)}</td>
        <td class="col-score">${escape(c.score)}</td>
      </tr>`).join('');

    const reflectieVragen = [
      { lo: 'LO5 - Onderzoekende houding', vraag: 'Welke stappen heb je gezet, tools of (in)formatie heb je onderzocht?' },
      { lo: 'LO6 - Communicatie', vraag: "Hoe verliep jouw communicatie met collega's, begeleiders en klanten?" },
      { lo: 'LO7 - Probleemoplossend vermogen', vraag: 'Beschrijf een probleem dat je bent tegengekomen. Hoe heb je dit aangepakt?' },
      { lo: 'LO8 - Persoonlijke ontwikkeling', vraag: 'Welke nieuwe vaardigheden heb je geleerd?' },
      { lo: 'LO9 - Professionele attitude', vraag: 'Hoe ben je omgegaan met afspraken, deadlines en verantwoordelijkheden?' }
    ];

    document.getElementById('zrReflectie').innerHTML = reflectieVragen.map((r, i) => `
      <div class="zr-reflectie-item">
        <p class="zr-reflectie-vraag"><span class="nr">${i + 1}.</span> ${escape(r.lo)} — ${escape(r.vraag)}</p>
        <textarea class="zr-reflectie-tekst" readonly placeholder="(ingevuld door student)"></textarea>
      </div>`).join('');
  </script>
</body>
</html>
