<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Logboeken — Docent</title>
  <link rel="stylesheet" href="/css/stijl.css" />
</head>
<body>

  <nav class="navbar">
    <span class="logo">Stage Monitor</span>
    <div class="nav-links">
      <a href="/pages/docent/dashboard.html">Dashboard</a>
      <a href="/pages/docent/studenten.html">Mijn studenten</a>
      <a href="/pages/docent/logboeken.html">Logboeken</a>
      <a href="/pages/docent/evaluatie.html">Evaluaties</a>
      <span class="rol-badge">Docent</span>
      <a href="#" id="uitlogBtn">Uitloggen</a>
    </div>
  </nav>

  <div class="container">
    <h1>Logboeken bekijken</h1>
    <p>Bekijk de logboekentries van je studenten en geef indien nodig een opmerking.</p>

    <label>Student kiezen</label>
    <select id="studentKeuze">
      <option value="">— Kies een student —</option>
      <!-- TODO: dynamisch vullen vanuit /api/docent/studenten -->
    </select>

    <div id="logboekenLijst" style="margin-top: 24px;">Kies eerst een student.</div>
  </div>

  <script src="/js/nav.js"></script>
  <script>
    document.getElementById('studentKeuze').addEventListener('change', async function () {
      const stageId = this.value
      if (!stageId) return
      // TODO: haal logboeken op via /api/logboeken/:stageId
      document.getElementById('logboekenLijst').textContent = '— nog te bouwen'
    })
  </script>
</body>
</html>
