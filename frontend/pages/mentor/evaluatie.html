<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Evaluatie — Stagementor</title>
  <link rel="stylesheet" href="/css/stijl.css" />
</head>
<body>

  <nav class="navbar">
    <span class="logo">Stage Monitor</span>
    <div class="nav-links">
      <a href="/pages/mentor/dashboard.html">Dashboard</a>
      <a href="/pages/mentor/logboeken.html">Logboeken</a>
      <a href="/pages/mentor/evaluatie.html">Evaluatie</a>
      <span class="rol-badge">Stagementor</span>
      <a href="#" id="uitlogBtn">Uitloggen</a>
    </div>
  </nav>

  <div class="container">
    <h1>Evaluatie invullen</h1>
    <p>Geef per competentie een score en feedback vanuit het bedrijf. Dit kan tussentijds en finaal.</p>

    <label>Type evaluatie</label>
    <select id="evalType">
      <option value="tussentijds">Tussentijdse evaluatie</option>
      <option value="finaal">Finale evaluatie</option>
    </select>

    <form id="evaluatieForm" style="margin-top: 20px;">
      <div id="competentiesLijst">Laden...</div>
      <button type="submit" style="margin-top:16px">Scores opslaan</button>
      <p id="melding"></p>
    </form>
  </div>

  <script src="/js/nav.js"></script>
  <script>
    async function laadCompetenties() {
      // TODO: haal competenties op via /api/competenties
      // Bouw per competentie: score (0–20) + feedbackveld voor de mentor
      document.getElementById('competentiesLijst').textContent = '— nog te bouwen'
    }
    laadCompetenties()

    document.getElementById('evaluatieForm').addEventListener('submit', async function (e) {
      e.preventDefault()
      // TODO: stuur scores op naar /api/evaluaties
      document.getElementById('melding').textContent = '— nog te bouwen'
    })
  </script>
</body>
</html>
