<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Aanvragen — Stagecommissie</title>
  <link rel="stylesheet" href="/css/stijl.css" />
</head>
<body>

  <nav class="navbar">
    <span class="logo">Stage Monitor</span>
    <div class="nav-links">
      <a href="/pages/stagecommissie/dashboard.html">Dashboard</a>
      <a href="/pages/stagecommissie/aanvragen.html">Aanvragen</a>
      <a href="/pages/stagecommissie/competenties.html">Competenties</a>
      <span class="rol-badge">Stagecommissie</span>
      <a href="#" id="uitlogBtn">Uitloggen</a>
    </div>
  </nav>

  <div class="container">
    <h1>Stageverzoeken beoordelen</h1>
    <p>Keur aanvragen goed, af, of vraag aanpassingen.</p>

    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>Bedrijf</th>
          <th>Periode</th>
          <th>Status</th>
          <th>Acties</th>
        </tr>
      </thead>
      <tbody id="aanvragenLijst">
        <tr><td colspan="5">Laden...</td></tr>
      </tbody>
    </table>

    <!-- Detail / beoordeling sectie -->
    <div id="beoordelingBlok" style="display:none; margin-top:32px;">
      <h2>Beoordeling voor: <span id="gekozenStudent"></span></h2>

      <label>Beslissing</label>
      <select id="beslissing">
        <option value="goedgekeurd">Goedgekeurd</option>
        <option value="afgekeurd">Afgekeurd</option>
        <option value="aanpassingen_vereist">Aanpassingen vereist</option>
      </select>

      <label>Feedback (verplicht bij afkeuring of aanpassingen)</label>
      <textarea id="feedback" rows="4"></textarea>

      <button id="slaOpBtn">Beslissing opslaan</button>
      <p id="melding"></p>
    </div>
  </div>

  <script src="/js/nav.js"></script>
  <script>
    let geselecteerdeStageId = null

    async function laadAanvragen() {
      // TODO: haal alle stages op via /api/stages
      // Toon een "Beoordeel"-knop per rij die beoordelingBlok toont
      document.getElementById('aanvragenLijst').innerHTML = '<tr><td colspan="5">— nog te bouwen</td></tr>'
    }
    laadAanvragen()

    document.getElementById('slaOpBtn').addEventListener('click', async function () {
      const beslissing = document.getElementById('beslissing').value
      const feedback   = document.getElementById('feedback').value
      // TODO: stuur naar /api/stages/:id/status
      document.getElementById('melding').textContent = '— nog te bouwen'
    })
  </script>
</body>
</html>
