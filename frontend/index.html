<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Inloggen</title>
  <link rel="stylesheet" href="/frontend/css/stijl.css" />
</head>
<body class="login-pagina">

  <div class="login-wrapper">
    <div class="login-kaart">

      <div class="login-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span>Stageplatform</span>
      </div>

      <h1>Inloggen</h1>
      <p class="login-subtitel">EhB – Toegepaste Informatica</p>

      <form id="loginForm" novalidate>

        <div class="veld-groep">
          <label for="email">E-mailadres</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="naam.achternaam@student.ehb.be"
            autocomplete="email"
            required
          />
          <small>Gebruik je EhB-adres: naam.achternaam@<strong>rol</strong>.ehb.be</small>
        </div>

        <div class="veld-groep">
          <label for="wachtwoord">Wachtwoord</label>
          <div class="wachtwoord-wrapper">
            <input
              type="password"
              id="wachtwoord"
              name="wachtwoord"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" id="toonWachtwoord" class="oog-knop" aria-label="Toon wachtwoord">
              <svg id="oogIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <p id="foutmelding" class="foutmelding" hidden></p>

        <button type="submit" id="loginKnop" class="login-knop">
          <span id="knopTekst">Inloggen</span>
          <span id="laadicoon" class="spinner" hidden></span>
        </button>

      </form>

    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
