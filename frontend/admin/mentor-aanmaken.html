<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Admin - Stagementor aanmaken</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Admin</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="gebruikers.html" class="nav-item">Gebruikers</a>
        <a href="studenten.html" class="nav-item">Studenten</a>
        <a href="docenten.html" class="nav-item">Docenten</a>
        <a href="mentoren.html" class="nav-item actief">Mentoren</a>
        <a href="bedrijven.html" class="nav-item">Bedrijven</a>
        <a href="stages.html" class="nav-item">Stages</a>
        <a href="documenten.html" class="nav-item">Documenten</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">

        <div class="view-header">
          <h1 class="view-titel">Stagementor aanmaken</h1>
          <p class="view-subtitel">Maak een nieuw account aan voor een stagementor</p>
        </div>

        <div class="kaart" style="max-width: 520px;">
          <div class="kaart-titel">Gegevens stagementor</div>

          <div class="formulier-kaart">
            <form id="mentorForm" class="formulier" novalidate>

              <div class="form-rij form-rij--2">
                <div class="form-group">
                  <label for="voornaam">Voornaam</label>
                  <input type="text" id="voornaam" placeholder="Jan" required />
                </div>
                <div class="form-group">
                  <label for="achternaam">Achternaam</label>
                  <input type="text" id="achternaam" placeholder="Jansen" required />
                </div>
              </div>

              <div class="form-group">
                <label for="functie">Functietitel (optioneel)</label>
                <input type="text" id="functie" placeholder="Software Engineer" />
              </div>

              <div class="form-group">
                <label for="wachtwoord">Wachtwoord</label>
                <input type="password" id="wachtwoord" placeholder="Minimaal 6 tekens" required />
                <small style="color: var(--color-text-muted);">
                  Het e-mailadres wordt automatisch aangemaakt: voornaam.achternaam@mentor.ehb.be
                </small>
              </div>

              <p id="melding" class="melding"></p>

              <div class="form-acties">
                <button type="submit" class="btn btn--primair">Account aanmaken</button>
                <a href="gebruikers.html" class="btn btn--secundair">Annuleren</a>
              </div>

            </form>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/mentor-aanmaken.js"></script>
</body>
</html>
