<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Admin - Dashboard</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Admin</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item actief">Dashboard</a>
        <a href="gebruikers.html" class="nav-item">Gebruikers</a>
        <a href="studenten.html" class="nav-item">Studenten</a>
        <a href="docenten.html" class="nav-item">Docenten</a>
        <a href="mentoren.html" class="nav-item">Mentoren</a>
        <a href="bedrijven.html" class="nav-item">Bedrijven</a>
        <a href="stages.html" class="nav-item">Stages</a>
        <a href="documenten.html" class="nav-item">Documenten</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">

        <section class="dashboard-welcome">
          <h1>Dashboard</h1>
        </section>

        <!-- Recente updates -->
        <section class="dashboard-card">
          <h2>Recente updates</h2>
          <div id="recente-updates"></div>
        </section>

        <!-- Overzicht stages -->
        <section class="dashboard-card">
          <h2>Overzicht stages</h2>
          <div id="overzicht-stages"></div>
        </section>

        <!-- Statistieken -->
        <div class="stat-kaarten" id="stat-kaarten"></div>

      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/adminDashboard.js"></script>

</body>
</html>
