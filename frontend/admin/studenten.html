<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Admin - Studenten</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Admin</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">

        <section class="dashboard-welcome">
          <h1>Studenten</h1>
        </section>

        <section class="dashboard-card">
          <h2>Studentendossiers</h2>
          <div id="studenten-lijst"></div>
        </section>

        <div class="stat-kaarten" id="stat-kaarten"></div>

      </main>
    </div>
  </div>

  <!-- Koppel mentor/docent modal -->
  <div id="koppelModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:8px;padding:24px;max-width:480px;width:90%;max-height:90vh;overflow-y:auto;">
      <h3 style="margin-top:0;">Mentor & Docent toewijzen</h3>
      <p id="koppelStudentNaam" style="font-weight:600;margin-bottom:16px;"></p>
      <form id="koppelForm" class="formulier" novalidate>
        <input type="hidden" id="koppelVoorstelId" />
        <div class="form-group">
          <label for="koppelMentor">Mentor</label>
          <select id="koppelMentor"></select>
        </div>
        <div class="form-group">
          <label for="koppelDocent">Docent</label>
          <select id="koppelDocent"></select>
        </div>
        <p id="koppelMelding" class="melding"></p>
        <div class="form-acties">
          <button type="submit" class="btn btn--primair">Koppelen</button>
          <button type="button" class="btn btn--secundair" onclick="sluitKoppelModal()">Annuleren</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/adminStudenten.js"></script>

</body>
</html>
