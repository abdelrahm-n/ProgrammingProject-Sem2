<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Admin - Stages</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Admin</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="gebruikers.html" class="nav-item">Gebruikers</a>
        <a href="studenten.html" class="nav-item">Studenten</a>
        <a href="docenten.html" class="nav-item">Docenten</a>
        <a href="mentoren.html" class="nav-item">Mentoren</a>
        <a href="bedrijven.html" class="nav-item">Bedrijven</a>
        <a href="stages.html" class="nav-item actief">Stages</a>
        <a href="documenten.html" class="nav-item">Documenten</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">

        <section class="dashboard-welcome">
          <h1>Stages</h1>
        </section>

        <!-- Tabs -->
        <div style="display:flex;gap:0;margin-bottom:24px;">
          <button class="tab-btn actief" id="tab-voorstellen" onclick="wisselTab('voorstellen')">Stagevoorstellen</button>
          <button class="tab-btn" id="tab-overeenkomsten" onclick="wisselTab('overeenkomsten')">Stageovereenkomsten</button>
        </div>

        <!-- Tab: Stagevoorstellen -->
        <section class="dashboard-card" id="sectie-voorstellen">
          <h2>Stagevoorstellen</h2>
          <div id="voorstellen-lijst"></div>
        </section>

        <!-- Tab: Stageovereenkomsten -->
        <section class="dashboard-card" id="sectie-overeenkomsten" style="display:none;">
          <h2>Stageovereenkomsten</h2>
          <div id="overeenkomsten-lijst"></div>
        </section>

      </main>
    </div>
  </div>

  <!-- Koppel modal -->
  <div id="koppelModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:8px;padding:24px;max-width:480px;width:90%;max-height:90vh;overflow-y:auto;">
      <h3 style="margin-top:0;">Mentor & Docent toewijzen</h3>
      <p id="koppelStudentNaam" style="font-weight:600;margin-bottom:16px;"></p>
      <form id="koppelForm" class="formulier" novalidate>
        <input type="hidden" id="koppelVoorstelId" />
        <div class="form-group">
          <label for="koppelMentor">Mentor</label>
          <select id="koppelMentor"></select>
        </div>
        <div class="form-group">
          <label for="koppelDocent">Docent</label>
          <select id="koppelDocent"></select>
        </div>
        <p id="koppelMelding" class="melding"></p>
        <div class="form-acties">
          <button type="submit" class="btn btn--primair">Koppelen</button>
          <button type="button" class="btn btn--secundair" onclick="sluitKoppelModal()">Annuleren</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/adminStages.js"></script>

</body>
</html>
