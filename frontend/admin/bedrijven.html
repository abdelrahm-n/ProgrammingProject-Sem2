<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Admin - Bedrijven</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Admin</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">

        <section class="dashboard-welcome">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
            <h1>Bedrijven</h1>
            <button class="btn btn--primair" onclick="openNieuwBedrijf()">+ Nieuw bedrijf</button>
          </div>
        </section>

        <section class="dashboard-card">
          <h2>Alle bedrijven</h2>
          <div id="bedrijven-lijst"></div>
        </section>

        <div class="stat-kaarten" id="stat-kaarten"></div>

      </main>
    </div>
  </div>

  <!-- Nieuw bedrijf modal -->
  <div id="nieuwBedrijfModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:8px;padding:24px;max-width:480px;width:90%;max-height:90vh;overflow-y:auto;">
      <h3 style="margin-top:0;">Nieuw bedrijf</h3>
      <form id="nieuwBedrijfForm" class="formulier" novalidate>
        <div class="form-group">
          <label for="bedrijfNaam">Bedrijfsnaam</label>
          <input type="text" id="bedrijfNaam" required />
        </div>
        <div class="form-group">
          <label for="bedrijfAdres">Adres</label>
          <input type="text" id="bedrijfAdres" />
        </div>
        <div class="form-group">
          <label for="bedrijfEmail">E-mail</label>
          <input type="email" id="bedrijfEmail" />
        </div>
        <div class="form-group">
          <label for="bedrijfTelefoon">Telefoon</label>
          <input type="text" id="bedrijfTelefoon" />
        </div>
        <div class="form-group">
          <label for="bedrijfContact">Contactpersoon</label>
          <input type="text" id="bedrijfContact" />
        </div>
        <p id="bedrijfMelding" class="melding"></p>
        <div class="form-acties">
          <button type="submit" class="btn btn--primair">Aanmaken</button>
          <button type="button" class="btn btn--secundair" onclick="sluitNieuwBedrijf()">Annuleren</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Bewerk bedrijf modal -->
  <div id="bewerkBedrijfModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:8px;padding:24px;max-width:480px;width:90%;max-height:90vh;overflow-y:auto;">
      <h3 style="margin-top:0;">Bedrijf bewerken</h3>
      <form id="bewerkBedrijfForm" class="formulier" novalidate>
        <input type="hidden" id="bewerkBedrijfId" />
        <div class="form-group">
          <label for="bewerkBedrijfNaam">Bedrijfsnaam</label>
          <input type="text" id="bewerkBedrijfNaam" required />
        </div>
        <div class="form-group">
          <label for="bewerkBedrijfAdres">Adres</label>
          <input type="text" id="bewerkBedrijfAdres" />
        </div>
        <div class="form-group">
          <label for="bewerkBedrijfEmail">E-mail</label>
          <input type="email" id="bewerkBedrijfEmail" />
        </div>
        <div class="form-group">
          <label for="bewerkBedrijfTelefoon">Telefoon</label>
          <input type="text" id="bewerkBedrijfTelefoon" />
        </div>
        <div class="form-group">
          <label for="bewerkBedrijfContact">Contactpersoon</label>
          <input type="text" id="bewerkBedrijfContact" />
        </div>
        <p id="bewerkBedrijfMelding" class="melding"></p>
        <div class="form-acties">
          <button type="submit" class="btn btn--primair">Opslaan</button>
          <button type="button" class="btn btn--secundair" onclick="sluitBewerkBedrijf()">Annuleren</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/adminBedrijven.js"></script>

</body>
</html>
