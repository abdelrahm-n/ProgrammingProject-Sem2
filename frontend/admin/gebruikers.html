<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Admin - Gebruikers</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Admin</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">

        <section class="dashboard-welcome">
          <h1>Gebruikers</h1>
        </section>

        <section class="dashboard-card">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
            <h2 style="margin:0;">Alle gebruikers</h2>
            <div style="display:flex;gap:8px;align-items:center;">
              <input type="text" id="zoekVeld" placeholder="Zoek op naam of e-mail..."
                style="padding:8px 12px;border:1px solid #D8D8D8;border-radius:4px;min-width:250px;" />
              <a href="nieuw-account.html" class="btn btn--primair">+ Nieuw account</a>
            </div>
          </div>
          <div id="gebruikers-lijst"></div>
        </section>

      </main>
    </div>
  </div>

  <!-- Rol wijzigen modal -->
  <div id="rolModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:8px;padding:24px;max-width:400px;width:90%;">
      <h3 style="margin-top:0;">Rol wijzigen</h3>
      <form id="rolForm" class="formulier" novalidate>
        <input type="hidden" id="rolModalId" />
        <div class="form-group">
          <label for="rolSelect">Nieuwe rol</label>
          <select id="rolSelect">
            <option value="student">Student</option>
            <option value="docent">Docent</option>
            <option value="stagementor">Stagementor</option>
            <option value="stagecommissie">Stagecommissie</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <p id="rolMelding" class="melding"></p>
        <div class="form-acties">
          <button type="submit" class="btn btn--primair">Opslaan</button>
          <button type="button" class="btn btn--secundair" onclick="sluitRolModal()">Annuleren</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Wachtwoord wijzigen modal -->
  <div id="wwModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:8px;padding:24px;max-width:400px;width:90%;">
      <h3 style="margin-top:0;">Wachtwoord wijzigen</h3>
      <form id="wwForm" class="formulier" novalidate>
        <input type="hidden" id="wwModalId" />
        <div class="form-group">
          <label for="nieuwWachtwoord">Nieuw wachtwoord</label>
          <input type="password" id="nieuwWachtwoord" placeholder="Minimaal 6 tekens" required />
        </div>
        <p id="wwMelding" class="melding"></p>
        <div class="form-acties">
          <button type="submit" class="btn btn--primair">Opslaan</button>
          <button type="button" class="btn btn--secundair" onclick="sluitWwModal()">Annuleren</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/adminGebruikers.js"></script>

</body>
</html>
