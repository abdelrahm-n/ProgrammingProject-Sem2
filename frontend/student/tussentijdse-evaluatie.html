<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Student - Tussentijdse evaluatie</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/student.css" />
  <style>
    .te-terug { display:inline-flex; align-items:center; gap:6px; color:#555; text-decoration:none; font-size:14px; margin-bottom:14px; }
    .te-terug:hover { text-decoration:underline; }
    .te-titel { font-size:24px; font-weight:800; color:#1E1E1E; margin:0 0 18px 0; }
    .te-card { background:#fff; border:1px solid #ececec; border-radius:14px; box-shadow:0 4px 14px rgba(15,23,42,.05); overflow:hidden; }
    .te-tabel { width:100%; border-collapse:collapse; }
    .te-tabel th, .te-tabel td { text-align:left; vertical-align:top; padding:12px 14px; border-bottom:1px solid #f1f1f1; font-size:13px; line-height:1.5; }
    .te-tabel th { background:#fafafa; font-size:12px; font-weight:700; color:#374151; }
    .te-tabel .num { text-align:center; font-weight:700; white-space:nowrap; }
    .te-crit { font-weight:700; color:#1E1E1E; }
    .te-totaal { display:flex; justify-content:space-between; max-width:420px; padding:12px 14px; font-size:14px; border-bottom:1px solid #f1f1f1; }
    .te-totaal:last-of-type { border-bottom:none; }
    .te-totaal .label { color:#374151; }
    .te-totaal .waarde { font-weight:800; }
    .te-status { padding:14px; }
    .te-badge { display:inline-block; padding:6px 14px; border-radius:999px; font-size:13px; font-weight:700; background:#dcfce7; color:#166534; }
    .te-leeg { padding:24px; color:#6b7280; }
  </style>
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Student</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <a href="evaluatie.html" class="te-terug">← Terug</a>
        <h1 class="te-titel">Tussentijdse evaluatie</h1>
        <div class="te-card" id="teKaart">
          <p class="te-leeg">Laden...</p>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const kaart = document.getElementById('teKaart');
    const MAX_PER = 5;

    const escape = (t) => { if (t == null) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

    (async function () {
      if (!token) { kaart.innerHTML = '<p class="te-leeg">Niet ingelogd.</p>'; return; }
      try {
        const resM = await fetch(API_URL + '/api/evaluaties/mijn', { headers: { 'Authorization': 'Bearer ' + token } });
        const momenten = await resM.json();
        const tussen = momenten.find(m => m.type_naam === 'tussentijdse_evaluatie') || momenten[0];
        if (!tussen) { kaart.innerHTML = '<p class="te-leeg">Er is nog geen tussentijdse evaluatie.</p>'; return; }

        const resB = await fetch(API_URL + '/api/evaluaties/' + tussen.id + '/beoordelingen', { headers: { 'Authorization': 'Bearer ' + token } });
        const b = await resB.json();
        if (!b.length) { kaart.innerHTML = '<p class="te-leeg">Geen competenties gevonden.</p>'; return; }

        const rijen = b.map(c => `
          <tr>
            <td class="te-crit">${escape(c.competentie_naam)}</td>
            <td class="num">${c.student_score != null ? c.student_score + '/5' : '-'}</td>
            <td class="num">${c.mentor_score != null ? c.mentor_score + '/5' : '-'}</td>
            <td>${c.student_reflectie ? escape(c.student_reflectie) : '<span style="color:#9ca3af">-</span>'}</td>
            <td>${c.mentor_feedback ? escape(c.mentor_feedback) : '<span style="color:#9ca3af">-</span>'}</td>
          </tr>`).join('');

        const max = b.length * MAX_PER;
        const studTot = b.reduce((s, c) => s + (Number(c.student_score) || 0), 0);
        const mentTot = b.reduce((s, c) => s + (Number(c.mentor_score) || 0), 0);
        const afgerond = b.every(c => c.mentor_score != null);

        kaart.innerHTML = `
          <table class="te-tabel">
            <thead><tr>
              <th style="width:22%">Competentie</th>
              <th class="num">Zelfscore student</th>
              <th class="num">Mentorscore</th>
              <th>Reflectie student</th>
              <th>Feedback mentor</th>
            </tr></thead>
            <tbody>${rijen}</tbody>
          </table>
          <div class="te-totaal"><span class="label">Studentscore totaal</span><span class="waarde">${studTot}/${max}</span></div>
          <div class="te-totaal"><span class="label">Mentorscore totaal</span><span class="waarde">${mentTot}/${max}</span></div>
          <div class="te-status">
            <span class="label" style="margin-right:10px;color:#374151;">Status</span>
            <span class="te-badge">${afgerond ? 'Tussentijdse evaluatie afgerond' : 'In behandeling'}</span>
          </div>`;
      } catch (e) {
        kaart.innerHTML = '<p class="te-leeg">Kon de evaluatie niet laden.</p>';
      }
    })();
  </script>
</body>
</html>
