<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Student - Logboek Detail</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/student.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Student</span>
        <button class="btn-terug" onclick="window.location.href='logboek.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <a href="logboek.html" style="display:inline-block;margin-bottom:16px;color:var(--primair);text-decoration:none;">&larr; Terug naar logboeken</a>
        <h2>Logboek Detail</h2>

        <section class="student-card">
          <h2>Logboekgegevens</h2>
          <div class="contract-info">
            <p><strong>Datum:</strong> <span id="logboekDatum"></span></p>
            <p><strong>Week:</strong> <span id="logboekWeek"></span></p>
            <p id="logboekStatusWrap" style="display:none;"><strong>Status:</strong> <span id="logboekStatus"></span></p>
          </div>
        </section>

        <section class="student-card">
          <h2>Uitgevoerde taken</h2>
          <p style="color:#666;margin-bottom:12px;">Geef per taak een korte titel en een beschrijving van wat je hebt gedaan.</p>
          <div id="takenContainer"></div>
          <button type="button" id="addTaskBtn" class="btn-terug" style="margin-top:12px;">+ Taak toevoegen</button>
        </section>

        <section class="student-card">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div>
              <h3>Reflectie</h3>
              <textarea id="reflectieField" rows="5" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;"
                placeholder="Wat heb je deze week geleerd? Hoe ging het?"></textarea>
            </div>
            <div>
              <h3>Problemen / leerpunten</h3>
              <textarea id="problemenField" rows="5" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;"
                placeholder="Welke moeilijkheden kwam je tegen? Waar wil je in groeien?"></textarea>
            </div>
          </div>
        </section>

        <section id="feedbackSection" class="student-card" style="display:none;">
          <h2>Mentorfeedback</h2>
          <p id="feedbackField"></p>
        </section>

        <div style="display:flex;gap:12px;margin-top:16px;">
          <button id="saveBtn" class="btn-terug">Opslaan als concept</button>
          <button id="submitBtn" class="btn-terug">Logboek indienen</button>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const urlParams = new URLSearchParams(window.location.search);
    const weekId = parseInt(urlParams.get('week'));
    const container = document.getElementById('takenContainer');

    function toonDatum(waarde) {
      if (!waarde) return '-';
      return new Date(waarde).toLocaleDateString('nl-BE', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function escape(t) {
      if (t == null) return '';
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    function maakTaakBlok(index, taak = { title: '', description: '' }, readonly = false) {
      const div = document.createElement('div');
      div.className = 'task-block';
      div.style.cssText = 'margin-bottom:12px;padding:12px;border:1px solid #ddd;border-radius:6px;';
      const ro = readonly ? 'readonly' : '';
      div.innerHTML =
        '<div style="font-weight:600;margin-bottom:8px;">Taak ' + index + '</div>' +
        '<input style="width:100%;padding:6px;margin-bottom:6px;border:1px solid #ccc;border-radius:4px;" placeholder="Titel van de taak" value="' + (taak.title || '').replace(/"/g, '&quot;') + '" ' + ro + '>' +
        '<textarea style="width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;" rows="3" placeholder="Beschrijving van de uitgevoerde taak..." ' + ro + '>' + (taak.description || '') + '</textarea>';
      return div;
    }

    async function laadDetail() {
      if (!token) { window.location.href = '../index.html'; return; }
      if (!weekId) { document.querySelector('main').innerHTML = '<p>Geen week opgegeven.</p>'; return; }

      try {
        const res = await fetch(API + '/api/logboeken/mijn', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet geladen');
        const data = await res.json();

        if (!data.stage) {
          document.querySelector('main').innerHTML = '<p>Je hebt nog geen actieve stage.</p>';
          return;
        }

        const weken = data.weken || [];
        const week = weken.find(w => w.id === weekId);

        if (!week) {
          document.querySelector('main').innerHTML = '<p>Deze week werd niet gevonden.</p>';
          return;
        }

        const readonly = week.status === 'ingediend' || week.status === 'goedgekeurd';

        document.getElementById('logboekWeek').textContent = 'Week ' + week.week_nummer;
        document.getElementById('logboekDatum').textContent = week.week_start + ' – ' + week.week_einde;

        if (week.status && week.status !== 'open') {
          document.getElementById('logboekStatusWrap').style.display = '';
          var statusTekst = week.status === 'goedgekeurd' ? 'Goedgekeurd' : 'Ingediend';
          document.getElementById('logboekStatus').textContent = statusTekst;
        }

        /* Taken = dagen van deze week */
        const dagen = week.dagen || [];
        container.innerHTML = '';
        if (dagen.length > 0) {
          dagen.forEach((dag, i) => {
            const blok = document.createElement('div');
            blok.className = 'task-block';
            blok.style.cssText = 'margin-bottom:12px;padding:12px;border:1px solid #ddd;border-radius:6px;';
            blok.innerHTML =
              '<div style="font-weight:600;margin-bottom:8px;">Dag ' + (i + 1) + ' — ' + toonDatum(dag.datum) + '</div>' +
              '<div style="margin-bottom:6px;"><strong>Taken:</strong> ' + escape(dag.uitgevoerde_taken) + '</div>' +
              '<div style="margin-bottom:6px;"><strong>Reflectie:</strong> ' + escape(dag.reflectie) + '</div>' +
              '<div><strong>Problemen:</strong> ' + escape(dag.problemen_leerpunten) + '</div>';
            container.appendChild(blok);
          });
        } else {
          container.innerHTML = '<p>Geen dagen ingevuld voor deze week.</p>';
        }

        /* Reflectie en problemen tonen (van eerste dag als samenvatting) */
        var eersteDag = dagen[0] || {};
        document.getElementById('reflectieField').value = eersteDag.reflectie || '';
        document.getElementById('problemenField').value = eersteDag.problemen_leerpunten || '';
        document.getElementById('reflectieField').readOnly = readonly;
        document.getElementById('problemenField').readOnly = readonly;

        /* Feedback */
        if (week.feedback_mentor) {
          document.getElementById('feedbackSection').style.display = '';
          document.getElementById('feedbackField').textContent = week.feedback_mentor;
        }

        /* Knoppen verbergen als ingediend */
        if (readonly) {
          document.getElementById('saveBtn').style.display = 'none';
          document.getElementById('submitBtn').style.display = 'none';
          document.getElementById('addTaskBtn').style.display = 'none';
        }
      } catch (err) {
        document.querySelector('main').innerHTML = '<p>Kon logboek niet laden. Probeer opnieuw in te loggen.</p>';
      }
    }

    laadDetail();
  </script>
</body>
</html>
