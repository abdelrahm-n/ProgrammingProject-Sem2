<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Student - Logboek Detail</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/student.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Student</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <a href="logboek.html" style="display:inline-block;margin-bottom:16px;color:var(--primair);text-decoration:none;">&larr; Terug naar logboeken</a>
        <h2>Logboek Detail</h2>

        <section class="student-card">
          <h2>Logboekgegevens</h2>
          <div class="contract-info">
            <p><strong>Datum:</strong> <span id="logboekDatum"></span></p>
            <p><strong>Week:</strong> <span id="logboekWeek"></span></p>
            <p id="logboekStatusWrap" style="display:none;"><strong>Status:</strong> <span id="logboekStatus"></span></p>
          </div>
        </section>

        <section class="student-card">
          <h2>Uitgevoerde taken</h2>
          <p style="color:#666;margin-bottom:12px;">Geef per taak een korte titel en een beschrijving van wat je hebt gedaan.</p>
          <div id="takenContainer"></div>
          <button type="button" id="addTaskBtn" class="btn-terug" style="margin-top:12px;">+ Taak toevoegen</button>
        </section>

        <section class="student-card">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div>
              <h3>Reflectie</h3>
              <textarea id="reflectieField" rows="5" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;"
                placeholder="Wat heb je deze week geleerd? Hoe ging het?"></textarea>
            </div>
            <div>
              <h3>Problemen / leerpunten</h3>
              <textarea id="problemenField" rows="5" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;"
                placeholder="Welke moeilijkheden kwam je tegen? Waar wil je in groeien?"></textarea>
            </div>
          </div>
        </section>

        <section id="feedbackSection" class="student-card" style="display:none;">
          <h2>Mentorfeedback</h2>
          <p id="feedbackField"></p>
        </section>

        <div style="display:flex;gap:12px;margin-top:16px;">
          <button id="saveBtn" class="btn-terug">Opslaan als concept</button>
          <button id="submitBtn" class="btn-terug">Logboek indienen</button>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const weekParam = parseInt(urlParams.get('week'));
    const isEigen = urlParams.get('eigen') === '1';
    const container = document.getElementById('takenContainer');

    function getEigenLogboeken() {
      const stored = localStorage.getItem('eigenLogboeken');
      return stored ? JSON.parse(stored) : [];
    }

    function maakTaakBlok(index, taak = { title: '', description: '' }, readonly = false) {
      const div = document.createElement('div');
      div.className = 'task-block';
      div.style.cssText = 'margin-bottom:12px;padding:12px;border:1px solid #ddd;border-radius:6px;';
      const ro = readonly ? 'readonly' : '';
      div.innerHTML =
        '<div style="font-weight:600;margin-bottom:8px;">Taak ' + index + '</div>' +
        '<input style="width:100%;padding:6px;margin-bottom:6px;border:1px solid #ccc;border-radius:4px;" placeholder="Titel van de taak" value="' + (taak.title || '').replace(/"/g, '&quot;') + '" ' + ro + '>' +
        '<textarea style="width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;" rows="3" placeholder="Beschrijving van de uitgevoerde taak..." ' + ro + '>' + (taak.description || '') + '</textarea>';
      return div;
    }

    function hernummerTaken() {
      container.querySelectorAll('.task-block').forEach((h, i) => {
        h.querySelector('div').textContent = 'Taak ' + (i + 1);
      });
    }

    function renderLogboek() {
      const eigenLogboeken = getEigenLogboeken();
      let logboek = null;

      if (isEigen) {
        logboek = eigenLogboeken.find(log => log.week === weekParam);
      } else {
        const sampleLogboeken = [
          {
            week: 3, datum: '12/03/2026', submitted: true, statusText: 'Feedback ontvangen',
            reflectie: 'Ik heb de toegewezen opdrachten correct uitgevoerd. Het netwerkprobleem had ik snel geanalyseerd en verbonden.',
            problemen: 'Ik had wat moeite met de ingewikkelde netwerkconfiguratie, maar na wat onderzoek lukte het me.',
            feedback: 'Je hebt de toegewezen taken correct uitgevoerd. Probeer in het volgende logboek meer initiatief te tonen.',
            tasks: [
              { title: 'Software geinstalleerd op nieuwe toestellen', description: 'Nieuwe laptops met Windows 11 voorzien van de nodige software.' },
              { title: 'Gebruikersaccounts aangemaakt', description: 'Nieuwe gebruikersaccounts aangemaakt en rechten ingesteld.' },
              { title: 'Netwerkproblemen onderzocht', description: 'Verbindingsproblemen op eerste verdieping opgelost.' }
            ]
          },
          {
            week: 2, datum: '05/03/2026', submitted: true, statusText: 'Goedgekeurd',
            reflectie: 'Goed kunnen werken met de systeembeheer taken.',
            problemen: 'Geen grote problemen tegen gekomen.',
            tasks: [
              { title: 'Server onderhoud', description: 'Backup scripts gecontroleerd en geupdate.' },
              { title: 'Database beheer', description: 'Database queries geoptimaliseerd.' }
            ]
          },
          {
            week: 1, datum: '26/02/2026', submitted: true, statusText: 'Goedgekeurd',
            reflectie: 'Goede kennismaking met het bedrijf en de IT-afdeling.',
            problemen: 'Geen specifieke problemen.',
            tasks: [
              { title: 'Kennismaking', description: 'Rondleiding op kantoor en introductie collegas.' }
            ]
          }
        ];
        logboek = sampleLogboeken.find(log => log.week === weekParam);
      }

      if (!logboek) {
        logboek = { week: weekParam || '', datum: '', submitted: false, tasks: [{}, {}, {}] };
      }

      const readonly = !!logboek.submitted;

      if (logboek.datum) {
        const dateObj = new Date(logboek.datum.split('/').reverse().join('-'));
        const tekst = isNaN(dateObj) ? logboek.datum
          : dateObj.toLocaleDateString('nl-NL', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('logboekDatum').textContent = tekst;
      } else {
        document.getElementById('logboekDatum').textContent = '\u2014';
      }
      document.getElementById('logboekWeek').textContent = logboek.week ? ('Week ' + logboek.week) : '\u2014';

      if (logboek.submitted && logboek.statusText) {
        document.getElementById('logboekStatusWrap').style.display = '';
        document.getElementById('logboekStatus').textContent = logboek.statusText;
      }

      const taken = (logboek.tasks && logboek.tasks.length) ? logboek.tasks : [{}, {}, {}];
      container.innerHTML = '';
      taken.forEach((taak, i) => container.appendChild(maakTaakBlok(i + 1, taak, readonly)));

      document.getElementById('reflectieField').value = logboek.reflectie || '';
      document.getElementById('problemenField').value = logboek.problemen || '';
      document.getElementById('reflectieField').readOnly = readonly;
      document.getElementById('problemenField').readOnly = readonly;

      if (logboek.submitted && logboek.feedback) {
        document.getElementById('feedbackSection').style.display = '';
        document.getElementById('feedbackField').textContent = logboek.feedback;
      }

      const saveBtn = document.getElementById('saveBtn');
      const submitBtn = document.getElementById('submitBtn');
      const addTaskBtn = document.getElementById('addTaskBtn');

      if (readonly) {
        saveBtn.style.display = 'none';
        submitBtn.style.display = 'none';
        addTaskBtn.style.display = 'none';
      } else {
        addTaskBtn.addEventListener('click', () => {
          const aantal = container.querySelectorAll('.task-block').length;
          container.appendChild(maakTaakBlok(aantal + 1));
        });
        submitBtn.addEventListener('click', () => {
          alert('Logboek ingediend!');
          window.location.href = 'logboek.html';
        });
        saveBtn.addEventListener('click', () => {
          alert('Concept opgeslagen!');
        });
      }
    }

    renderLogboek();
  </script>
</body>
</html>
