<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Student - Logboek</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/student.css" />
  <link rel="stylesheet" href="../css/logboeken.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Student</span>
        <button class="btn-terug" onclick="window.location.href='dashboard.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <div class="logboeken-panel">
          <div class="logboeken-header">
            <h1>Overzicht logboeken</h1>
            <div class="progress-info">
              <div class="progress-item">
                <span class="progress-label">Huidige week</span>
                <span class="progress-value" id="statHuidigeWeek">-</span>
              </div>
              <div class="progress-item">
                <span class="progress-label">Deze week ingevuld</span>
                <span class="progress-value" id="statDezeWeek">-</span>
              </div>
              <div class="progress-item">
                <span class="progress-label">Totaal logboeken</span>
                <span class="progress-value" id="statTotaal">-</span>
              </div>
              <div class="progress-item">
                <span class="progress-label">Laatste feedback</span>
                <span class="progress-value" id="statFeedback">-</span>
              </div>
            </div>
          </div>

          <div class="logboeken-table-container">
            <table class="student-logboeken-table">
              <thead>
                <tr>
                  <th>Week</th>
                  <th>Logboeken</th>
                  <th>Items</th>
                  <th>Status</th>
                  <th>Mentorfeedback</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody id="logboekTableBody">
                <!-- Rijen worden via JavaScript ingevuld -->
              </tbody>
            </table>
          </div>

          <div class="logboeken-actions">
            <button class="btn btn--primair">Nieuw logboek invullen</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal voor nieuwe logboekdag -->
  <div id="newLogboekModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Nieuwe logboekdag</h2>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <form id="newLogboekForm">
        <div class="form-group">
          <label>Datum</label>
          <input type="date" id="datumInput" required />
        </div>
        <div class="form-group">
          <label>Uitgevoerde taken</label>
          <textarea id="takenInput" placeholder="Wat heb je vandaag gedaan?" required></textarea>
        </div>
        <div class="form-group">
          <label>Reflectie</label>
          <textarea id="reflectieInput" placeholder="Wat heb je geleerd of ervaren?"></textarea>
        </div>
        <div class="form-group">
          <label>Problemen / leerpunten</label>
          <textarea id="problemenInput" placeholder="Welke problemen kwam je tegen?"></textarea>
        </div>
        <p id="modalFout" style="color:#990018; display:none; margin:0 0 10px;"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn--secundair" id="cancelModal">Annuleren</button>
          <button type="submit" class="btn btn--primair">Opslaan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';

    const statusInfo = {
      open:        { tekst: 'Ingediend',          klasse: 'badge badge--actief' },
      ingediend:   { tekst: 'Ingediend',          klasse: 'badge badge--actief' },
      goedgekeurd: { tekst: 'Goedgekeurd',         klasse: 'badge badge--goedgekeurd' }
    };

    let stagedata = null;

    const tableBody = document.getElementById('logboekTableBody');

    function toonDatum(waarde) {
      if (!waarde) return '-';
      return new Date(waarde).toLocaleDateString('nl-BE');
    }
    function escape(t) {
      if (t == null) return '';
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    async function laadLogboek() {
      let data;
      try {
        const res = await fetch(API_URL + '/api/logboeken/mijn', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ingelogd');
        data = await res.json();
      } catch (e) {
        tableBody.innerHTML = '<tr><td colspan="6">Kon logboek niet laden. Log opnieuw in via de startpagina.</td></tr>';
        return;
      }

      if (!data.stage) {
        tableBody.innerHTML = '<tr><td colspan="6">Je hebt nog geen actieve stage.</td></tr>';
        document.querySelector('.btn.btn--primair').style.display = 'none';
        return;
      }

      stagedata = data.stage;

      /* Datum-input beperken tot stageperiode + weekends blokkeren */
      var datumInput = document.getElementById('datumInput');
      if (datumInput && data.stage.startdatum && data.stage.einddatum) {
        datumInput.min = data.stage.startdatum;
        datumInput.max = data.stage.einddatum;

        datumInput.addEventListener('change', function() {
          var geselecteerd = new Date(this.value);
          var dag = geselecteerd.getDay();
          if (dag === 0 || dag === 6) {
            this.value = '';
            var foutEl = document.getElementById('modalFout');
            foutEl.textContent = 'Weekenden (za-zo) zijn niet toegestaan. Kies een datum tussen maandag en vrijdag.';
            foutEl.style.display = 'block';
          }
        });
      }

      const weken = data.weken || [];

      // Bereken totaal weken uit stage-datum (zelfde logica als backend)
      var dagenPerWeek = 5;
      var totaalWeken = 0;
      if (data.stage && data.stage.startdatum && data.stage.einddatum) {
        var start = new Date(data.stage.startdatum);
        var eind = new Date(data.stage.einddatum);

        // Eerste maandag op of na startdatum
        var startDag = start.getDay();
        var eersteMaandagOffset = startDag === 0 ? 1 : startDag === 1 ? 0 : (8 - startDag);
        var eersteMaandag = new Date(start);
        eersteMaandag.setDate(start.getDate() + eersteMaandagOffset);

        // Laatste maandag op of vóór einddatum
        var eindDag = eind.getDay();
        var laatsteMaandagOffset = eindDag === 0 ? -6 : eindDag === 1 ? 0 : -(eindDag - 1);
        var laatsteMaandag = new Date(eind);
        laatsteMaandag.setDate(eind.getDate() + laatsteMaandagOffset);

        totaalWeken = Math.max(1, Math.round((laatsteMaandag - eersteMaandag) / (1000 * 60 * 60 * 24 * 7)) + 1);
      }

      // Statistiek-kaarten
      let totaalDagen = 0;
      let laatsteFeedbackWeek = null;
      weken.forEach(w => {
        var uniekeDagen = [...new Set(w.dagen.map(d => d.datum))].length;
        totaalDagen += uniekeDagen;
        if (w.feedback_mentor) laatsteFeedbackWeek = w.week_nummer;
      });
      const laatste = weken[weken.length - 1];
      var uniekeLaatste = laatste ? [...new Set(laatste.dagen.map(d => d.datum))].length : 0;
      document.getElementById('statHuidigeWeek').textContent = 'Week ' + (laatste ? laatste.week_nummer : 0) + ' / ' + totaalWeken;
      document.getElementById('statDezeWeek').textContent = uniekeLaatste + ' / ' + dagenPerWeek + ' dagen';
      document.getElementById('statTotaal').textContent = totaalDagen + ' / ' + (totaalWeken * dagenPerWeek);
      document.getElementById('statFeedback').textContent = laatsteFeedbackWeek ? ('Week ' + laatsteFeedbackWeek) : '-';

      // Huidige week bovenaan
      weken.reverse();

      // Tabel
      tableBody.innerHTML = '';
      if (weken.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6">Nog geen logboeken. Klik op "Nieuw logboek invullen".</td></tr>';
        return;
      }

      weken.forEach(week => {
        const info = statusInfo[week.status] || statusInfo.open;
        const weekUniek = [...new Set(week.dagen.map(d => d.datum))].length;
        const rij = document.createElement('tr');
        rij.innerHTML = `
          <td><span class="week-badge">Week ${week.week_nummer}</span></td>
          <td>${weekUniek} / ${dagenPerWeek}</td>
          <td>${week.dagen.length}</td>
          <td><span class="${info.klasse}">${info.tekst}</span></td>
          <td><span class="feedback-text">${escape(week.feedback_mentor) || '-'}</span></td>
          <td><a class="details-link" href="#" data-week="${week.id}">Bekijken</a></td>`;
        tableBody.appendChild(rij);

        // Detailrij (verborgen) met de dagen van die week
        const detail = document.createElement('tr');
        detail.className = 'week-detail-rij';
        const dagenHtml = week.dagen.length
          ? week.dagen.map(d => `
              <div class="dag-detail">
                <strong>${toonDatum(d.datum)}</strong>
                <div><em>Taken:</em> ${escape(d.uitgevoerde_taken)}</div>
                <div><em>Reflectie:</em> ${escape(d.reflectie) || '-'}</div>
                <div><em>Problemen:</em> ${escape(d.problemen_leerpunten) || '-'}</div>
              </div>`).join('')
          : '<p>Geen dagen in deze week.</p>';

        const feedbackHtml = week.feedback_mentor
          ? `<div class="dag-detail dag-detail--feedback">
               <strong>Mentorfeedback</strong>
               <div>${escape(week.feedback_mentor)}</div>
             </div>`
          : '';

        detail.innerHTML = `<td colspan="6" class="week-detail-cel">${dagenHtml}${feedbackHtml}</td>`;
        tableBody.appendChild(detail);
      });

      // Bekijken -> detailrij tonen/verbergen
      tableBody.querySelectorAll('.details-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const detailRij = link.closest('tr').nextElementSibling;
          if (detailRij && detailRij.classList.contains('week-detail-rij')) {
            detailRij.classList.toggle('open');
          }
        });
      });
    }

    // Modal
    const modal = document.getElementById('newLogboekModal');
    document.querySelector('.btn.btn--primair').addEventListener('click', () => modal.classList.remove('hidden'));
    document.getElementById('closeModal').addEventListener('click', () => modal.classList.add('hidden'));
    document.getElementById('cancelModal').addEventListener('click', () => modal.classList.add('hidden'));

    document.getElementById('newLogboekForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fout = document.getElementById('modalFout');
      fout.style.display = 'none';

      const datumValue = document.getElementById('datumInput').value;
      if (!datumValue) {
        fout.textContent = 'Kies een geldige datum.';
        fout.style.display = 'block';
        return;
      }

      if (datumValue < stagedata.startdatum || datumValue > stagedata.einddatum) {
        fout.textContent = 'De datum valt buiten je stageperiode (' + stagedata.startdatum + ' t.e.m. ' + stagedata.einddatum + ').';
        fout.style.display = 'block';
        return;
      }

      var dagVanDeWeek = new Date(datumValue).getDay();
      if (dagVanDeWeek === 0 || dagVanDeWeek === 6) {
        fout.textContent = 'Je kunt alleen doordeweeks (ma-vr) logboekitems invullen.';
        fout.style.display = 'block';
        return;
      }

      const payload = {
        datum: datumValue,
        uitgevoerde_taken: document.getElementById('takenInput').value.trim(),
        reflectie: document.getElementById('reflectieInput').value.trim(),
        problemen_leerpunten: document.getElementById('problemenInput').value.trim()
      };

      try {
        const res = await fetch(API_URL + '/api/logboeken/dag', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          fout.textContent = data.fout || 'Opslaan mislukt.';
          fout.style.display = 'block';
          return;
        }
        modal.classList.add('hidden');
        e.target.reset();
        laadLogboek();
      } catch (err) {
        fout.textContent = 'Kan geen verbinding maken met de server.';
        fout.style.display = 'block';
      }
    });

    laadLogboek();
  </script>

</body>
</html>
