<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Student - Logboek</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/student.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Student</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="stage-indienen.html" class="nav-item">Stage indienen</a>
        <a href="logboek.html" class="nav-item">Logboek</a>
        <a href="evaluatie.html" class="nav-item">Evaluatie</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">
        <div class="logboeken-panel">
          <div class="logboeken-header">
            <h1>Overzicht logboeken</h1>
            <div class="progress-info">
              <div class="progress-item">
                <span class="progress-label">Huidige week</span>
                <span class="progress-value">Week 4 / 12</span>
              </div>
              <div class="progress-item">
                <span class="progress-label">Deze week ingevuld</span>
                <span class="progress-value">4 / 5 dagen</span>
              </div>
              <div class="progress-item">
                <span class="progress-label">Totaal logboeken</span>
                <span class="progress-value">19 / 60</span>
              </div>
              <div class="progress-item">
                <span class="progress-label">Laatste feedback</span>
                <span class="progress-value">Week 3</span>
              </div>
            </div>
          </div>

          <div class="logboeken-table-container">
            <table class="student-logboeken-table">
              <thead>
                <tr>
                  <th>Week</th>
                  <th>Logboeken</th>
                  <th>Items</th>
                  <th>Status</th>
                  <th>Mentorfeedback</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody id="logboekTableBody">
                <!-- Rows worden hier ingevoegd via JavaScript -->
              </tbody>
            </table>
          </div>

          <div class="logboeken-actions">
            <button class="btn-nieuw-logboek">Nieuw logboek invullen</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal voor nieuw logboek -->
  <div id="newLogboekModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Nieuw logboek invullen</h2>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <form id="newLogboekForm">
        <div class="form-group">
          <label>Week</label>
          <select id="weekSelect" required>
            <option value="">Kies een week</option>
            <option value="4">Week 4</option>
            <option value="5">Week 5</option>
            <option value="6">Week 6</option>
            <option value="7">Week 7</option>
            <option value="8">Week 8</option>
            <option value="9">Week 9</option>
            <option value="10">Week 10</option>
            <option value="11">Week 11</option>
            <option value="12">Week 12</option>
          </select>
        </div>

        <div class="form-group">
          <label>Datum</label>
          <input type="date" id="datumInput" required />
        </div>

        <div class="form-group">
          <label>Aantal items ingevuld</label>
          <input type="number" id="itemsInput" min="1" max="10" required />
        </div>

        <div class="form-group">
          <label>Reflectie</label>
          <textarea id="reflectieInput" placeholder="Wat heb je vandaag geleerd?"></textarea>
        </div>

        <div class="form-group">
          <label>Problemen / leerpunten</label>
          <textarea id="probiemenInput" placeholder="Waar wil je nog in groeien?"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancelModal">Annuleren</button>
          <button type="submit" class="btn-primary">Opslaan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    // Sample logboeken data
    const sampleLogboeken = [
      {
        week: 4,
        logboeken: '4 / 5',
        items: 6,
        submitted: false,
        details: 'Verder aanvullen'
      },
      {
        week: 3,
        logboeken: '5 / 5',
        items: 8,
        submitted: true,
        status: 'feedback',
        statusText: 'Feedback ontvangen',
        feedback: 'Meer initiatief nemen',
        details: 'Bekijken'
      },
      {
        week: 2,
        logboeken: '5 / 5',
        items: 6,
        submitted: true,
        status: 'goedgekeurd',
        statusText: 'Goedgekeurd',
        feedback: 'Taken correct uitgevoerd',
        details: 'Bekijken'
      },
      {
        week: 1,
        logboeken: '5 / 5',
        items: 7,
        submitted: true,
        status: 'goedgekeurd',
        statusText: 'Goedgekeurd',
        feedback: 'Goede start',
        details: 'Bekijken'
      }
    ];

    // Laad eigen logboeken uit localStorage
    function getEigenLogboeken() {
      const stored = localStorage.getItem('eigenLogboeken');
      return stored ? JSON.parse(stored) : [];
    }

    // Sla eigen logboek op in localStorage
    function saveEigenLogboek(logboek) {
      const eigen = getEigenLogboeken();
      eigen.push(logboek);
      localStorage.setItem('eigenLogboeken', JSON.stringify(eigen));
    }

    // Render tabel met sample + eigen logboeken
    function renderLogboeken() {
      const tableBody = document.getElementById('logboekTableBody');
      tableBody.innerHTML = '';

      // Combineer sample en eigen logboeken
      const allLogboeken = [...sampleLogboeken, ...getEigenLogboeken()];
      
      allLogboeken.forEach((entry, index) => {
        const row = document.createElement('tr');
        
        const statusText = entry.submitted ? entry.statusText : 'Nog niet ingediend';
        const statusClass = entry.submitted ? `status-${entry.status}` : 'status-nog-ingediend';
        const feedbackText = entry.submitted ? entry.feedback : '';
        const detailsText = entry.submitted ? entry.details : 'Verder aanvullen';
        const isEigen = index >= sampleLogboeken.length;
        
        row.innerHTML = `
          <td><span class="week-badge">Week ${entry.week}</span></td>
          <td>${entry.logboeken || '? / 5'}</td>
          <td>${entry.items}</td>
          <td><span class="${statusClass}">${statusText}</span></td>
          <td><span class="feedback-text">${feedbackText}</span></td>
          <td><a class="details-link" href="logboek-detail.html?week=${entry.week}${isEigen ? '&eigen=1' : ''}">${detailsText}</a></td>
        `;
        
        tableBody.appendChild(row);
      });
    }

    // Modal handling
    const modal = document.getElementById('newLogboekModal');
    const openBtn = document.querySelector('.btn-nieuw-logboek');
    const closeBtn = document.getElementById('closeModal');
    const cancelBtn = document.getElementById('cancelModal');
    const form = document.getElementById('newLogboekForm');

    openBtn.addEventListener('click', () => {
      modal.classList.remove('hidden');
    });

    closeBtn.addEventListener('click', () => {
      modal.classList.add('hidden');
    });

    cancelBtn.addEventListener('click', () => {
      modal.classList.add('hidden');
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const week = parseInt(document.getElementById('weekSelect').value);
      const datum = document.getElementById('datumInput').value;
      const items = parseInt(document.getElementById('itemsInput').value);
      const reflectie = document.getElementById('reflectieInput').value;
      const problemen = document.getElementById('probiemenInput').value;

      const newLogboek = {
        week,
        logboeken: '? / 5',
        items,
        submitted: false,
        details: 'Verder aanvullen',
        datum,
        reflectie,
        problemen,
        isEigen: true,
        tasks: [
          { title: 'Taak 1', description: '' },
          { title: 'Taak 2', description: '' },
          { title: 'Taak 3', description: '' }
        ]
      };

      saveEigenLogboek(newLogboek);
      renderLogboeken();
      modal.classList.add('hidden');
      form.reset();
    });

    // Initial render
    renderLogboeken();

    // Event listeners
    document.querySelector('.btn-nieuw-logboek').addEventListener('click', () => {
      // Modal wordt al geopend door click handler hierboven
    });
  </script>

</body>
</html>
