<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Student - Logboek</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/student.css" />
</head>

<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Student</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="logboek.html" class="nav-item">Logboek</a>
        <a href="evaluatie.html" class="nav-item">Evaluatie</a>
        <a href="profiel.html" class="nav-item">Profiel</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">

        <section class="dashboard-welcome">
          <h1>Logboek</h1>
          <p id="logboek-intro">Houd hier dagelijks bij waar je aan gewerkt hebt tijdens je stage.</p>
        </section>

        <!-- Melding als er nog geen actieve stage is -->
        <section class="dashboard-card" id="geen-stage-card" style="display:none;">
          <h2>Nog geen actieve stage</h2>
          <p>Je kan pas een logboek bijhouden zodra je stage actief is.</p>
        </section>

        <!-- Formulier om een dagitem toe te voegen -->
        <section class="dashboard-card" id="toevoeg-card" style="display:none;">
          <h2>Nieuwe logboekdag toevoegen</h2>
          <div class="form-grid">
            <div class="form-group">
              <label>Datum</label>
              <input type="date" id="logDatum" />
            </div>
          </div>
          <div class="form-group">
            <label>Uitgevoerde taken</label>
            <textarea id="logTaken" rows="2" placeholder="Wat heb je vandaag gedaan?"></textarea>
          </div>
          <div class="form-group">
            <label>Reflectie</label>
            <textarea id="logReflectie" rows="2" placeholder="Wat heb je geleerd of ervaren?"></textarea>
          </div>
          <div class="form-group">
            <label>Problemen en leerpunten</label>
            <textarea id="logProblemen" rows="2" placeholder="Welke problemen kwam je tegen?"></textarea>
          </div>
          <button type="button" class="btn btn--primair" id="toevoegBtn">Logboekdag toevoegen</button>
          <p id="logFout" style="color:#990018;margin-top:10px;display:none;"></p>
        </section>

        <!-- Overzicht van de weken en dagen -->
        <section class="dashboard-card" id="overzicht-card" style="display:none;">
          <h2>Overzicht per week</h2>
          <div id="logboek-weken"></div>
        </section>

      </main>
    </div>
  </div>

  <script src="../js/logboek.js"></script>
  <script src="../js/nav.js"></script>

</body>

</html>
