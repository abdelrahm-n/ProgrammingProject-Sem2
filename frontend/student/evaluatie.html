<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Student - Evaluatie</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/student.css" />
</head>

<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Student</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <div class="evaluatie-panel">
          <h1 class="evaluatie-titel">Evaluatie</h1>
          <p class="evaluatie-intro">De eindevaluatie is nog niet beschikbaar.</p>
          <p class="evaluatie-intro">Deze wordt op het einde van je stage door het bedrijf ingevuld.</p>

          <!-- Eindevaluatie -->
          <div class="eval-card">
            <div class="eval-rij">
              <span class="eval-label">Beschikbaarheid</span>
              <span class="eval-mid"></span>
              <span class="eval-waarde" id="eindeBeschikbaar">-</span>
            </div>
            <div class="eval-rij">
              <span class="eval-label">Beoordelaar</span>
              <span class="eval-mid"></span>
              <span class="eval-waarde" id="beoordelaar">-</span>
            </div>
            <div class="eval-rij">
              <span class="eval-label">Zelfreflectie (eindevaluatie)</span>
              <span class="eval-mid" id="eindeDeadline">-</span>
              <span class="eval-waarde"><span class="eval-status eval-status--wacht" id="eindeStatus">In afwachting</span></span>
            </div>
          </div>

          <!-- Tussentijdse evaluatie -->
          <div class="eval-card">
            <div class="eval-rij">
              <span class="eval-label">Tussentijdsevaluatie</span>
              <span class="eval-mid" id="tussenDatum">-</span>
              <span class="eval-waarde"><span class="eval-status eval-status--gepland" id="tussenStatus">Gepland</span></span>
            </div>
            <div class="eval-rij">
              <span class="eval-label">Zelfreflectie</span>
              <span class="eval-mid" id="tussenDeadline">-</span>
              <span class="eval-waarde" id="zelfreflectieActie">
                <button type="button" class="btn-eval-invullen" onclick="window.location.href='zelfevaluatie.html'">Invullen</button>
              </span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';

    function formatDatum(datum) {
      if (!datum) return '-';
      return new Date(datum).toLocaleDateString('nl-BE', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    (async function () {
      if (!token) return;

      try {
        const resStage = await fetch(API_URL + '/api/stageovereenkomst/mijn', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (resStage.ok) {
          const stage = await resStage.json();
          var einddatum = stage.einddatum;
          var startdatum = stage.startdatum;
          var mentorNaam = stage.mentor_voornaam && stage.mentor_achternaam
            ? stage.mentor_voornaam + ' ' + stage.mentor_achternaam
            : '-';

          document.getElementById('eindeBeschikbaar').textContent = formatDatum(einddatum);
          document.getElementById('eindeDeadline').textContent = 'voor ' + formatDatum(einddatum);
          document.getElementById('beoordelaar').textContent = mentorNaam;

          if (startdatum) {
            var start = new Date(startdatum);
            var mid = new Date(start);
            mid.setMonth(mid.getMonth() + Math.round((new Date(einddatum) - start) / (1000 * 60 * 60 * 24 * 2) / 30));
            document.getElementById('tussenDatum').textContent = formatDatum(mid);
            document.getElementById('tussenDeadline').textContent = 'voor ' + formatDatum(mid);
          }
        }

        const resM = await fetch(API_URL + '/api/evaluaties/mijn', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const momenten = await resM.json();
        const tussen = momenten.find(m => m.type_naam === 'tussentijdse_evaluatie') || momenten[0];
        const einde = momenten.find(m => m.type_naam === 'eindevaluatie');

        if (tussen) {
          const resB = await fetch(API_URL + '/api/evaluaties/' + tussen.id + '/beoordelingen', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          const beoordelingen = await resB.json();
          const ingediend = beoordelingen.length > 0 &&
            beoordelingen.every(b => b.student_score != null && b.student_reflectie);

          if (ingediend) {
            const t = document.getElementById('tussenStatus');
            t.textContent = 'In afwachting';
            t.className = 'eval-status eval-status--wacht';
            document.getElementById('zelfreflectieActie').innerHTML =
              '<span class="eval-status eval-status--ingediend">Ingediend</span>';
          }
        }

        if (einde) {
          const resEB = await fetch(API_URL + '/api/evaluaties/' + einde.id + '/beoordelingen', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          const eindeBeoordelingen = await resEB.json();
          const eindeIngediend = eindeBeoordelingen.length > 0 &&
            eindeBeoordelingen.every(b => b.student_score != null && b.student_reflectie);

          if (eindeIngediend) {
            document.getElementById('eindeStatus').textContent = 'Ingediend';
            document.getElementById('eindeStatus').className = 'eval-status eval-status--ingediend';
          }
        }
      } catch (e) { /* laat standaard waarden staan */ }
    })();
  </script>
</body>

</html>
