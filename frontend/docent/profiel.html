<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Profiel</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="studenten.html" class="nav-item">Studenten</a>
        <a href="logboeken.html" class="nav-item">Logboeken</a>
        <a href="evaluatie.html" class="nav-item">Evaluatie</a>
        <a href="profiel.html" class="nav-item actief">Profiel</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">
        <section class="page-header">
          <h1>Mijn profiel</h1>
          <p>Bekijk je persoonlijke gegevens.</p>
        </section>

        <section class="student-card">
          <h2>Persoonlijke gegevens</h2>
          <div class="contract-info">
            <p><strong>Naam:</strong> <span id="naam"></span></p>
            <p><strong>E-mail:</strong> <span id="email"></span></p>
            <p><strong>Rol:</strong> <span id="rol"></span></p>
            <p><strong>Vakgroep:</strong> <span id="vakgroep"></span></p>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
const API_URL = 'http://localhost:3000';
const token = localStorage.getItem('token');
if (!token) window.location.href = '../index.html';

function zet(id, waarde) {
  var veld = document.getElementById(id);
  if (veld) veld.textContent = waarde || '-';
}

async function laadProfiel() {
  try {
    var resp = await fetch(API_URL + '/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (resp.status === 401) { window.location.href = '../index.html'; return; }
    var data = await resp.json();
    zet('naam', data.voornaam + ' ' + data.achternaam);
    zet('email', data.email);
    zet('rol', 'Docent');
    zet('vakgroep', data.vakgroep);
  } catch (e) { console.error(e); }
}
laadProfiel();
  </script>
  <script src="../js/nav.js"></script>
</body>
</html>
