<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Logboek Detail</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="studenten.html" class="nav-item">Studenten</a>
        <a href="logboeken.html" class="nav-item">Logboeken</a>
        <a href="evaluatie.html" class="nav-item">Evaluatie</a>
        <a href="profiel.html" class="nav-item">Profiel</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">
        <!-- Terug en Student Name -->
        <div class="logboek-header">
          <button class="btn btn--secundair btn--sm" onclick="window.history.back()">← Terug</button>
          <h1 id="studentName">Ryan Machiels</h1>
        </div>

        <!-- Logboek Content -->
        <div class="logboek-content">
          <!-- Logboek Leerling Section -->
          <div class="logboek-section">
            <h2>Logboek Inzendingen</h2>
            <div id="logboekEntries" class="logboek-entries">
              <!-- Entries worden hier ingevoegd via JavaScript -->
            </div>
          </div>

          <!-- Stagementor Goedkeuring Section -->
          <div class="goedkeuring-section">
            <h2>Goedkeuring</h2>
            <div id="goedkeuringEntries" class="goedkeuring-entries">
              <!-- Approval statuses worden hier ingevoegd via JavaScript -->
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('student');

    const logboekContainer = document.getElementById('logboekEntries');
    const goedkeuringContainer = document.getElementById('goedkeuringEntries');

    function escape(t){ if(t==null) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function toonDatum(w){ return w ? new Date(w).toLocaleDateString('nl-BE') : '-'; }

    const statusBadge = {
      goedgekeurd: { klasse: 'status-badge status-goedgekeurd', tekst: 'Goedgekeurd', icon: '✓' },
      ingediend:   { klasse: 'status-badge status-afgekeurd',  tekst: 'Ingediend',   icon: '•' },
      open:        { klasse: 'status-badge status-afgekeurd',  tekst: 'In bewerking', icon: '…' }
    };

    (async function () {
      let data;
      try {
        const res = await fetch(API_URL + '/api/logboeken/student/' + studentId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        data = await res.json();
      } catch (e) {
        logboekContainer.innerHTML = '<p style="color:#999;">Kon logboek niet laden. Log opnieuw in via de startpagina.</p>';
        return;
      }

      if (data.student) {
        document.getElementById('studentName').textContent = data.student.voornaam + ' ' + data.student.achternaam;
      }

      const weken = data.weken || [];
      if (!weken.length) {
        logboekContainer.innerHTML = '<p style="color:#999;">Nog geen logboeken ingediend.</p>';
        goedkeuringContainer.innerHTML = '<p style="color:#999;">Wachten op inzending.</p>';
        return;
      }

      // Inzendingen per week (alleen lezen)
      logboekContainer.innerHTML = '';
      goedkeuringContainer.innerHTML = '';

      weken.forEach((week, index) => {
        const dagenHtml = week.dagen.length
          ? week.dagen.map(d => `
              <div class="logboek-entry" style="animation-delay:${index * 0.05}s">
                <div class="logboek-entry-date">📅 ${toonDatum(d.datum)}</div>
                <p class="logboek-entry-text"><strong>Taken:</strong> ${escape(d.uitgevoerde_taken)}</p>
                <p class="logboek-entry-text"><strong>Reflectie:</strong> ${escape(d.reflectie) || '-'}</p>
                <p class="logboek-entry-text"><strong>Problemen:</strong> ${escape(d.problemen_leerpunten) || '-'}</p>
              </div>`).join('')
          : '<p style="color:#999; font-size:13px;">Geen dagen ingevuld.</p>';

        logboekContainer.insertAdjacentHTML('beforeend',
          `<h3 style="margin:18px 0 8px;">Week ${week.week_nummer}</h3>${dagenHtml}`);

        // Goedkeuring per week
        const b = statusBadge[week.status] || statusBadge.open;
        const fb = week.feedback_mentor
          ? `<p class="logboek-entry-text" style="margin-top:6px;"><strong>Feedback mentor:</strong> ${escape(week.feedback_mentor)}</p>`
          : '';
        goedkeuringContainer.insertAdjacentHTML('beforeend', `
          <div class="goedkeuring-item">
            <div class="goedkeuring-item-header">
              <span class="goedkeuring-item-date">Week ${week.week_nummer}</span>
              <span class="status-badge ${b.klasse}">${b.icon} ${b.tekst}</span>
            </div>
            ${fb}
          </div>`);
      });
    })();
  </script>

</body>
</html>
