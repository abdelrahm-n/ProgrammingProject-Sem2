<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Logboek Detail</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
  <link rel="stylesheet" href="../css/button.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <style>
    .week-detail-rij { display: none; }
    .week-detail-rij.open { display: table-row; }
    .week-detail-cel { padding: 0 !important; border: none !important; }
    .week-detail-inner { padding: 0; }
    .day-card-inline { padding: 10px 0; border-bottom: 1px solid var(--color-border); }
    .day-card-inline:last-child { border-bottom: none; }
    .day-card-inline h4 { margin: 0 0 6px; font-size: 13px; color: var(--color-text-muted); }
    .day-card-inline p { margin: 0 0 4px; font-size: 14px; }
    .day-card-inline p:last-child { margin: 0; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='logboeken.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <section class="dashboard-card">
          <h1 id="studentName">Logboek</h1>
          <div class="contract-info">
            <p><strong>Opleiding:</strong> <span id="studentStudy">-</span></p>
            <p><strong>Bedrijf:</strong> <span id="studentBedrijf">-</span></p>
          </div>
        </section>

        <section class="dashboard-card">
          <h2>Weken</h2>
          <div id="weekTabel"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('student');
    const container = document.getElementById('weekTabel');

    function escape(t){ if(t==null) return '(niet ingevuld)'; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function toonDatum(w){ return w ? new Date(w).toLocaleDateString('nl-BE') : '-'; }

    const statusLabels = {
      goedgekeurd: { klasse: 'badge badge--goedgekeurd', tekst: 'Goedgekeurd' },
      ingediend:   { klasse: 'badge badge--ingediend',   tekst: 'Ingediend' },
      open:        { klasse: 'badge badge--actief',      tekst: 'Open' }
    };

    (async function () {
      var data;
      try {
        var res = await fetch(API_URL + '/api/logboeken/student/' + studentId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        data = await res.json();
      } catch (e) {
        container.innerHTML = '<p>Kon logboek niet laden.</p>';
        return;
      }

      if (data.student) {
        document.getElementById('studentName').textContent = 'Logboek ' + data.student.voornaam + ' ' + data.student.achternaam;
        document.getElementById('studentStudy').textContent = data.student.opleiding || '-';
      }
      if (data.stage) {
        document.getElementById('studentBedrijf').textContent = data.stage.bedrijf || '-';
      }

      var weken = data.weken || [];
      if (!weken.length) {
        container.innerHTML = '<p>Nog geen logboeken ingevuld.</p>';
        return;
      }

      var dagenPerWeek = 5;
      var html = '<table><thead><tr>';
      html += '<th>Week</th><th>Dagen</th><th>Status</th><th>Mentorfeedback</th><th>Actie</th>';
      html += '</tr></thead><tbody>';

      weken.reverse().forEach(function(week) {
        var info = statusLabels[week.status] || statusLabels.open;
        var weekUniek = week.dagen ? week.dagen.length : 0;

        html += '<tr data-week-id="' + week.id + '">';
        html += '<td><strong>Week ' + week.week_nummer + '</strong></td>';
        html += '<td>' + weekUniek + ' / ' + dagenPerWeek + '</td>';
        html += '<td><span class="' + info.klasse + '">' + info.tekst + '</span></td>';
        html += '<td>' + escape(week.feedback_mentor) + '</td>';
        html += '<td><a href="#" class="btn btn--primair btn--sm details-link" data-week="' + week.id + '">Bekijk</a></td>';
        html += '</tr>';

        html += '<tr class="week-detail-rij" data-detail-week="' + week.id + '">';
        html += '<td colspan="5"><div class="week-detail-inner">';

        if (week.dagen && week.dagen.length) {
          week.dagen.forEach(function(d) {
            html += '<div class="day-card-inline">';
            html += '<h4>' + toonDatum(d.datum) + '</h4>';
            html += '<p><strong>Taken:</strong> ' + escape(d.uitgevoerde_taken) + '</p>';
            html += '<p><strong>Reflectie:</strong> ' + escape(d.reflectie) + '</p>';
            html += '<p><strong>Leerpunten:</strong> ' + escape(d.problemen_leerpunten) + '</p>';

            if (d.competenties && d.competenties.length) {
              html += '<p style="margin-top:6px;">' + d.competenties.map(function(c) {
                return '<span class="lo-badge">' + escape(String(c.naam).split(/\s*-\s*/)[0].trim()) + '</span>';
              }).join(' ') + '</p>';
            }

            if (d.feedback && d.feedback.length) {
              d.feedback.forEach(function(f) {
                html += '<p style="margin-top:6px;"><em>' + escape(f.voornaam + ' ' + f.achternaam) + ' (' + escape(f.rol) + '):</em> ' + escape(f.feedback) + '</p>';
              });
            }
            html += '</div>';
          });
        } else {
          html += '<p>Geen dagen ingevuld.</p>';
        }

        if (week.feedback_mentor) {
          html += '<div style="padding-top:12px; border-top:1px solid var(--color-border); margin-top:8px;">';
          html += '<p><strong>Mentorfeedback:</strong> ' + escape(week.feedback_mentor) + '</p>';
          html += '</div>';
        }

        html += '</div></td></tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;

      container.querySelectorAll('.details-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var weekId = link.getAttribute('data-week');
          var detailRij = container.querySelector('.week-detail-rij[data-detail-week="' + weekId + '"]');
          if (detailRij) {
            detailRij.classList.toggle('open');
            link.textContent = detailRij.classList.contains('open') ? 'Sluit' : 'Bekijk';
          }
        });
      });
    })();

  </script>
</body>
</html>
