<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Logboek Detail</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
  <link rel="stylesheet" href="../css/logboeken.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='logboeken.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <div class="logboeken-panel">
          <div class="logboeken-header">
            <h1 id="studentName">Student</h1>
            <div class="progress-info">
              <div class="progress-item">
                <span class="progress-label">Richting</span>
                <span class="progress-value" id="studentStudy">-</span>
              </div>
              <div class="progress-item">
                <span class="progress-label">Bedrijf</span>
                <span class="progress-value" id="studentBedrijf">-</span>
              </div>
            </div>
          </div>

          <div class="logboeken-table-container">
            <table class="student-logboeken-table">
              <thead>
                <tr>
                  <th>Week</th>
                  <th>Logboeken</th>
                  <th>Items</th>
                  <th>Status</th>
                  <th>Mentorfeedback</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody id="logboekTableBody">
                <tr><td colspan="6">Laden...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('student');
    const tableBody = document.getElementById('logboekTableBody');

    function escape(t){ if(t==null) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function toonDatum(w){ return w ? new Date(w).toLocaleDateString('nl-BE') : '-'; }

    const statusInfo = {
      goedgekeurd: { klasse: 'badge badge--goedgekeurd', tekst: 'Goedgekeurd' },
      ingediend:   { klasse: 'badge badge--actief',      tekst: 'Ingediend' },
      open:        { klasse: 'badge badge--actief',      tekst: 'Ingediend' }
    };

    (async function () {
      let data;
      try {
        const res = await fetch(API_URL + '/api/logboeken/student/' + studentId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        data = await res.json();
      } catch (e) {
        tableBody.innerHTML = '<tr><td colspan="6">Kon logboek niet laden. Log opnieuw in als docent.</td></tr>';
        return;
      }

      if (data.student) {
        document.getElementById('studentName').textContent = data.student.voornaam + ' ' + data.student.achternaam;
        document.getElementById('studentStudy').textContent = data.student.opleiding || '-';
      }
      if (data.stage) {
        document.getElementById('studentBedrijf').textContent = data.stage.bedrijf || '-';
      }

      const weken = data.weken || [];
      const dagenPerWeek = 5;
      weken.reverse();
      if (!weken.length) {
        tableBody.innerHTML = '<tr><td colspan="6">Nog geen logboeken ingevuld.</td></tr>';
        return;
      }

      tableBody.innerHTML = '';
      weken.forEach(week => {
        const info = statusInfo[week.status] || statusInfo.open;
        const weekUniek = week.dagen ? [...new Set(week.dagen.map(d => d.datum))].length : 0;

        const rij = document.createElement('tr');
        rij.innerHTML = `
          <td><span class="week-badge">Week ${week.week_nummer}</span></td>
          <td>${weekUniek} / ${dagenPerWeek}</td>
          <td>${week.dagen ? week.dagen.length : 0}</td>
          <td><span class="${info.klasse}">${info.tekst}</span></td>
          <td><span class="feedback-text">${escape(week.feedback_mentor) || '-'}</span></td>
          <td><a class="details-link" href="#" data-week="${week.id}">Bekijken</a></td>`;
        tableBody.appendChild(rij);

        const detail = document.createElement('tr');
        detail.className = 'week-detail-rij';
        const dagenHtml = week.dagen && week.dagen.length
          ? week.dagen.map(d => {
              const bestaand = (d.feedback || []).map(f =>
                `<div><em>${escape(f.voornaam + ' ' + f.achternaam)} (${escape(f.rol)}):</em> ${escape(f.feedback)}</div>`).join('');
              return `
              <div class="dag-detail">
                <strong>${toonDatum(d.datum)}</strong>
                <div><em>Taken:</em> ${escape(d.uitgevoerde_taken)}</div>
                <div><em>Reflectie:</em> ${escape(d.reflectie) || '-'}</div>
                <div><em>Problemen:</em> ${escape(d.problemen_leerpunten) || '-'}</div>
                <div class="dag-feedback" style="margin-top:8px">
                  ${bestaand}
                  <textarea id="fb-${d.id}" rows="2" placeholder="Feedback geven op deze dag..." style="width:100%;margin-top:6px"></textarea>
                  <button onclick="geefFeedback(${d.id})">Feedback opslaan</button>
                </div>
              </div>`;
            }).join('')
          : '<p>Geen dagen ingevuld.</p>';

        const feedbackHtml = week.feedback_mentor
          ? `<div class="dag-detail dag-detail--feedback">
               <strong>Mentorfeedback</strong>
               <div>${escape(week.feedback_mentor)}</div>
             </div>`
          : '';

        detail.innerHTML = `<td colspan="6" class="week-detail-cel">${dagenHtml}${feedbackHtml}</td>`;
        tableBody.appendChild(detail);
      });

      tableBody.querySelectorAll('.details-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const detailRij = link.closest('tr').nextElementSibling;
          if (detailRij && detailRij.classList.contains('week-detail-rij')) {
            detailRij.classList.toggle('open');
          }
        });
      });
    })();

    /* Docent geeft feedback op een logboekdag */
    window.geefFeedback = async function (itemId) {
      const veld = document.getElementById('fb-' + itemId);
      const tekst = veld.value.trim();
      if (!tekst) { alert('Schrijf eerst feedback.'); return; }
      try {
        const res = await fetch(API_URL + '/api/logboeken/dag/' + itemId + '/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ feedback: tekst })
        });
        if (!res.ok) { const r = await res.json().catch(() => ({})); throw new Error(r.fout || 'mislukt'); }
        window.location.reload();
      } catch (e) {
        alert('Opslaan mislukt: ' + e.message);
      }
    };
  </script>
</body>
</html>
