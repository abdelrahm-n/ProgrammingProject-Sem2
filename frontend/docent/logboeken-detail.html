<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Logboek Detail</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="studenten.html" class="nav-item">Studenten</a>
        <a href="logboeken.html" class="nav-item">Logboeken</a>
        <a href="evaluatie.html" class="nav-item">Evaluatie</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">
        <!-- Terug en Student Name -->
        <div class="logboek-header">
          <button class="btn-terug-klein" onclick="window.history.back()">← Terug</button>
          <h1 id="studentName">Ryan Machiels</h1>
        </div>

        <!-- Logboek Content -->
        <div class="logboek-content">
          <!-- Logboek Leerling Section -->
          <div class="logboek-section">
            <h2>Logboek Inzendingen</h2>
            <div id="logboekEntries" class="logboek-entries">
              <!-- Entries worden hier ingevoegd via JavaScript -->
            </div>
          </div>

          <!-- Stagementor Goedkeuring Section -->
          <div class="goedkeuring-section">
            <h2>Goedkeuring</h2>
            <div id="goedkeuringEntries" class="goedkeuring-entries">
              <!-- Approval statuses worden hier ingevoegd via JavaScript -->
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    // Sample logboek data - leeg totdat student indient
    const logboekData = [];

    // Get student name from URL or use default
    const params = new URLSearchParams(window.location.search);
    const studentName = params.get('student') || 'Ryan Machiels';
    
    document.getElementById('studentName').textContent = studentName;

    // Render logboek entries
    const logboekContainer = document.getElementById('logboekEntries');
    
    if (logboekData.length === 0) {
      const emptyDiv = document.createElement('div');
      emptyDiv.style.cssText = 'text-align: center; padding: 40px 20px; color: #999;';
      emptyDiv.innerHTML = `
        <svg style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        <p style="font-size: 14px; margin: 0;">Nog geen logboeken ingediend</p>
        <p style="font-size: 12px; margin: 8px 0 0 0;">De student zal deze nog moeten indienen</p>
      `;
      logboekContainer.appendChild(emptyDiv);
    } else {
      logboekData.forEach((entry, index) => {
        const entryDiv = document.createElement('div');
        entryDiv.className = 'logboek-entry';
        entryDiv.style.animationDelay = (index * 0.1) + 's';
        entryDiv.innerHTML = `
          <div class="logboek-entry-date">📅 ${entry.date}</div>
          <p class="logboek-entry-text">${entry.text}</p>
        `;
        logboekContainer.appendChild(entryDiv);
      });
    }

    // Render goedkeuring entries
    const goedkeuringContainer = document.getElementById('goedkeuringEntries');
    
    if (logboekData.length === 0) {
      const emptyDiv = document.createElement('div');
      emptyDiv.style.cssText = 'text-align: center; padding: 24px 16px; color: #999;';
      emptyDiv.innerHTML = `
        <svg style="width: 32px; height: 32px; margin-bottom: 12px; opacity: 0.5;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <p style="font-size: 12px; margin: 0;">Wachting op inzending</p>
      `;
      goedkeuringContainer.appendChild(emptyDiv);
    } else {
      logboekData.forEach((entry, index) => {
        const statusDiv = document.createElement('div');
        statusDiv.className = 'goedkeuring-item';
        statusDiv.style.animationDelay = (index * 0.1) + 's';
        
        const badgeClass = entry.status === 'goedgekeurd' ? 'status-goedgekeurd' : 'status-afgeekeurd';
        const badgeText = entry.status === 'goedgekeurd' ? 'Goedgekeurd' : 'Afgeekeurd';
        const icon = entry.status === 'goedgekeurd' ? '✓' : '✗';
        
        statusDiv.innerHTML = `
          <div class="goedkeuring-item-header">
            <span class="goedkeuring-item-date">${entry.date}</span>
            <span class="status-badge ${badgeClass}">${icon} ${badgeText}</span>
          </div>
        `;
        goedkeuringContainer.appendChild(statusDiv);
      });
    }
  </script>

</body>
</html>
