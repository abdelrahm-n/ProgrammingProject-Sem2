<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Evaluatie</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">

        <div class="view-header">
          <h1 class="view-titel">Evaluaties</h1>
          <p class="view-subtitel">Geef feedback per competentie en stel de eindscore in voor jouw studenten</p>
        </div>

        <div class="logboeken-table-container" style="margin-bottom:24px">
          <table class="student-logboeken-table">
            <thead>
              <tr>
                <th>Naam</th>
                <th>Richting</th>
                <th>Bedrijf</th>
                <th>Evaluatie</th>
              </tr>
            </thead>
            <tbody id="studentenLijst">
              <tr><td colspan="4">Laden...</td></tr>
            </tbody>
          </table>
        </div>

        <div id="evaluatieInhoud"></div>

      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/evaluatie-docent.js"></script>

</body>
</html>
