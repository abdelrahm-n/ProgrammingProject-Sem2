<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Overeenkomsten</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
  <link rel="stylesheet" href="../css/button.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='dashboard.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <section class="dashboard-card">
          <h1>Stageovereenkomsten</h1>
          <p>
            Overzicht van de stageovereenkomsten van je studenten. Als docent teken je
            niet mee: de mentor en de stagecommissie ondertekenen de aanvraag. Hier
            controleer je enkel of de aanvraag gelukt is.
          </p>
        </section>

        <section class="dashboard-card">
          <h2>Mijn studenten</h2>
          <div id="overzichtLijst"><p>Laden...</p></div>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';

    function escape(t) {
      if (t == null) return '';
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    function toonDatum(waarde) {
      if (!waarde) return '-';
      return new Date(waarde).toLocaleDateString('nl-BE');
    }

    /* Handtekeningbadge per partij (alleen-lezen) */
    function handtekening(label, getekend) {
      const cls = getekend ? 'badge--goedgekeurd' : 'badge--afgekeurd';
      return '<span class="badge ' + cls + '">' + label + '</span>';
    }

    function resultaat(o) {
      const volledig = o.getekend_door_student && o.getekend_door_bedrijf && o.getekend_door_school;
      if (o.gevalideerd_op || o.status === 'gevalideerd') {
        return '<span class="badge badge--goedgekeurd">Gelukt - stage actief</span>';
      }
      if (volledig) {
        return '<span class="badge badge--goedgekeurd">Volledig getekend</span>';
      }
      return '<span class="badge badge--ingediend">In behandeling</span>';
    }

    function bouwTabel(data) {
      let html = '<table><thead><tr>' +
        '<th>Student</th><th>Bedrijf</th><th>Mentor</th><th>Periode</th>' +
        '<th>Handtekeningen</th><th>Resultaat</th></tr></thead><tbody>';
      data.forEach(function (o) {
        const naam = escape(o.student_voornaam + ' ' + o.student_achternaam);
        const mentor = o.mentor_voornaam ? escape(o.mentor_voornaam + ' ' + o.mentor_achternaam) : '-';
        const periode = toonDatum(o.startdatum) + ' - ' + toonDatum(o.einddatum);
        html += '<tr>';
        html += '<td><strong>' + naam + '</strong></td>';
        html += '<td>' + escape(o.bedrijf_naam || '-') + '</td>';
        html += '<td>' + mentor + '</td>';
        html += '<td>' + periode + '</td>';
        html += '<td class="handtekeningen-cell">' +
          handtekening('Student', o.getekend_door_student) + ' ' +
          handtekening('Mentor', o.getekend_door_bedrijf) + ' ' +
          handtekening('Commissie', o.getekend_door_school) + '</td>';
        html += '<td>' + resultaat(o) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    async function laadOvereenkomsten() {
