<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Studenten</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
  <style>
    .st-head { display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap; margin-bottom:20px; }
    .st-head h1 { margin:0; font-size:26px; font-weight:800; color:#1E1E1E; }
    .st-zoek { position:relative; max-width:420px; margin-bottom:18px; }
    .st-zoek input { width:100%; padding:11px 14px 11px 38px; border:1px solid #d8d8d8; border-radius:10px; font-size:14px; }
    .st-zoek svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#9ca3af; }

    .st-card { background:#fff; border:1px solid #ececec; border-radius:14px; box-shadow:0 4px 14px rgba(15,23,42,.05); overflow:hidden; }
    .st-tabel { width:100%; border-collapse:collapse; }
    .st-tabel th { text-align:left; font-size:12px; font-weight:700; color:#6b7280; padding:14px 20px; background:#fafafa; border-bottom:1px solid #ececec; }
    .st-tabel td { padding:16px 20px; border-bottom:1px solid #f1f1f1; font-size:15px; color:#1E1E1E; vertical-align:middle; }
    .st-tabel tr:last-child td { border-bottom:none; }
    .st-tabel tbody tr:hover { background:#faf7f7; }
    .st-naam { font-weight:700; }
    .st-jaar { display:block; font-size:12px; color:#9ca3af; margin-top:2px; }
    .st-score { font-size:20px; font-weight:800; color:#1E1E1E; }
    .st-fiche { color:var(--rol-accent,#8B0015); font-weight:700; text-decoration:none; }
    .st-fiche:hover { text-decoration:underline; }
  </style>
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='dashboard.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="studenten.html" class="nav-item actief">Studenten</a>
        <a href="logboeken.html" class="nav-item">Logboeken</a>
        <a href="evaluatie.html" class="nav-item">Evaluatie</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">
        <div class="st-head">
          <h1 id="docentNaam">Studenten</h1>
        </div>

        <div class="st-zoek">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="zoek" placeholder="Zoeken op naam..." />
        </div>

        <div class="st-card">
          <table class="st-tabel">
            <thead>
              <tr>
                <th style="width:45%">Naam</th>
                <th style="width:30%">Totaalscore</th>
                <th style="width:25%">Actie</th>
              </tr>
            </thead>
            <tbody id="studentenBody">
              <tr><td colspan="3">Laden...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const body = document.getElementById('studentenBody');
    const MAX_SCORE = 80;

    const dnaam = localStorage.getItem('naam');
    if (dnaam) document.getElementById('docentNaam').textContent = dnaam;

    function escape(t){ if(t==null) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    async function laad() {
      let studenten;
      try {
        const res = await fetch(API_URL + '/api/docent/mijn-studenten', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        studenten = await res.json();
      } catch (e) {
        body.innerHTML = '<tr><td colspan="3">Kon studenten niet laden. Log opnieuw in als docent.</td></tr>';
        return;
      }

      if (!studenten.length) {
        body.innerHTML = '<tr><td colspan="3">Geen toegewezen studenten.</td></tr>';
        return;
      }

      body.innerHTML = '';
      studenten.forEach(s => {
        const naam = s.voornaam + ' ' + s.achternaam;
        const score = (s.totaalscore != null) ? `${s.totaalscore}/${MAX_SCORE}` : `-/${MAX_SCORE}`;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="st-naam">${escape(naam)}</span><span class="st-jaar">1ste jaar</span></td>
          <td><span class="st-score">${score}</span></td>
          <td><a class="st-fiche" href="studentenfiche.html?stage=${s.stage_id}">Studentenfiche</a></td>`;
        body.appendChild(tr);
      });
    }

    document.getElementById('zoek').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('#studentenBody tr').forEach(row => {
        const n = row.querySelector('.st-naam')?.textContent.toLowerCase() || '';
        row.style.display = n.includes(term) ? '' : 'none';
      });
    });

    laad();
  </script>
</body>
</html>
