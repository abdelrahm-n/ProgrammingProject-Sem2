<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Studenten</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
  <link rel="stylesheet" href="../css/button.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='dashboard.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <section class="dashboard-card">
          <h1>Studenten</h1>
          <p>Overzicht van je toegewezen studenten.</p>
        </section>

        <section class="dashboard-card">
          <div id="studentenOverzicht">
            <p>Laden...</p>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const container = document.getElementById('studentenOverzicht');

    function escape(t){ if(t==null) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    async function laad() {
      var studenten;
      try {
        var res = await fetch(API_URL + '/api/docent/mijn-studenten', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        studenten = await res.json();
      } catch (e) {
        container.innerHTML = '<p>Kon studenten niet laden. Log opnieuw in als docent.</p>';
        return;
      }

      if (!studenten.length) {
        container.innerHTML = '<p>Geen toegewezen studenten.</p>';
        return;
      }

      var html = '<table><thead><tr>';
      html += '<th>Student</th><th>Bedrijf</th><th>Score</th><th>Actie</th>';
      html += '</tr></thead><tbody>';

      studenten.forEach(function(s) {
        var naam = escape(s.voornaam + ' ' + s.achternaam);
        var score = (s.totaalscore != null) ? s.totaalscore : '-';

        html += '<tr>';
        html += '<td><strong>' + naam + '</strong><br><small style="color:var(--color-text-muted);">' + (escape(s.opleiding) || '-') + '</small></td>';
        html += '<td>' + (escape(s.bedrijf) || '-') + '</td>';
        html += '<td>' + score + '</td>';
        html += '<td><a href="studentenfiche.html?stage=' + s.stage_id + '" class="btn btn--primair btn--sm">Bekijk</a></td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    laad();
  </script>
</body>
</html>
