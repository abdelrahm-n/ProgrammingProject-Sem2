<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Docent - Logboeken</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/docent.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Docent</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="studenten.html" class="nav-item">Studenten</a>
        <a href="logboeken.html" class="nav-item">Logboeken</a>
        <a href="evaluatie.html" class="nav-item">Evaluatie</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Uitloggen
        </a>
      </nav>

      <main class="content-area">
        <!-- Header Section -->
        <div class="page-header">
          <div class="header-content">
            <h1>Naam docent</h1>
            <div class="stats-container">
              <div class="stat-item">
                <span class="stat-label">aantal studenten</span>
                <span class="stat-value">52</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">ingevulde logboeken</span>
                <span class="stat-value">343</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Search and Navigation -->
        <div class="search-section">
          <input type="text" class="search-input" placeholder="Zoeken..." />
        </div>

        <!-- Logboeken Table -->
        <div class="table-container">
          <table class="logboeken-table">
            <thead>
              <tr>
                <th>Naam</th>
                <th>Richting</th>
                <th>Logboek</th>
                <th>Zie Logboek</th>
              </tr>
            </thead>
            <tbody id="studentenBody">
              <!-- Rijen via JavaScript -->
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    const token = localStorage.getItem('token') || '';
    const body = document.getElementById('studentenBody');

    function escape(t){ if(t==null) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    async function laadStudenten() {
      let studenten;
      try {
        const res = await fetch(API_URL + '/api/logboeken/studenten', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('niet ok');
        studenten = await res.json();
      } catch (e) {
        body.innerHTML = '<tr><td colspan="4">Kon studenten niet laden. Log opnieuw in via de startpagina.</td></tr>';
        return;
      }

      if (!studenten.length) {
        body.innerHTML = '<tr><td colspan="4">Geen toegewezen studenten.</td></tr>';
        return;
      }

      // Statistiek bovenaan
      const totaalWeken = studenten.reduce((s, x) => s + Number(x.aantal_weken || 0), 0);
      const statEls = document.querySelectorAll('.stat-value');
      if (statEls[0]) statEls[0].textContent = studenten.length;
      if (statEls[1]) statEls[1].textContent = totaalWeken;

      body.innerHTML = '';
      studenten.forEach(s => {
        const naam = escape(s.voornaam + ' ' + s.achternaam);
        const rij = document.createElement('tr');
        rij.innerHTML = `
          <td>
            <div class="student-name">
              <div>${naam}</div>
              <span class="label-jaar">${escape(s.bedrijf) || ''}</span>
            </div>
          </td>
          <td>${escape(s.opleiding) || '-'}</td>
          <td><span class="logboek-status">${s.aantal_weken} week/weken</span></td>
           <td><button class="btn btn--secundair btn--sm" data-id="${s.student_id}">Open</button></td>`;
        body.appendChild(rij);
      });

      document.querySelectorAll('.btn[data-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = 'logboeken-detail.html?student=' + btn.dataset.id;
        });
      });
    }

    // Zoekfunctionaliteit
    document.querySelector('.search-input').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('#studentenBody tr').forEach(row => {
        const naam = row.querySelector('.student-name div')?.textContent.toLowerCase() || '';
        const richting = row.querySelector('td:nth-child(2)')?.textContent.toLowerCase() || '';
        row.style.display = (naam.includes(term) || richting.includes(term)) ? '' : 'none';
      });
    });

    laadStudenten();
  </script>

</body>
</html>
