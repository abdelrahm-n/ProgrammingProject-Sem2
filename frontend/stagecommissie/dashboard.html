<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagecommissie - Dashboard</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/stagecommissie.css" />
</head>
<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagecommissie</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <section class="dashboard-card">
          <h1>Dashboard Stagecommissie</h1>
          <p>Overzicht van alle stageaanvragen en overeenkomsten.</p>
        </section>

        <section class="dashboard-card">
          <div id="commissieStats"></div>
        </section>

        <section class="dashboard-card">
          <h2>Alle stageaanvragen</h2>
          <div id="commissieOverzicht">
            <p>Laden...</p>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/commissieDashboard.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/stagecommissieDashboard.js"></script>

</body>
</html>
