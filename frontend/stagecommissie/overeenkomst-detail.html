<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stageovereenkomst ondertekenen</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/stagecommissie.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagecommissie</span>
        <button class="btn-terug" onclick="window.location.href='overeenkomsten.html'">Terug naar overeenkomsten</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <section class="dashboard-card">
          <h1>Stageovereenkomst</h1>
          <p>Details van de stageovereenkomst die wacht op je handtekening.</p>
        </section>

        <div id="overeenkomstDetails">
          <p>Laden...</p>
        </div>

        <div id="handtekeningSectie" style="display:none;">
          <div class="contract-signing">
            <div class="signature-block">
              <div class="signature-line"></div>
              <p class="signature-name" id="signatureNaam">-</p>
              <p class="signature-role">Ondertekenaar hogeschool</p>
            </div>
            <button class="btn btn--primair" id="ondertekenBtn">Ondertekenen als hogeschool</button>
          </div>
        </div>

        <div id="bevestiging" style="display:none;">
          <div class="success-message">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <h2>Succesvol ondertekend</h2>
            <p>Je hebt de stageovereenkomst succesvol ondertekend.</p>
            <a href="overeenkomsten.html" class="btn-primary">Terug naar overeenkomsten</a>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/commissieOvereenkomst.js"></script>
  <script src="../js/nav.js"></script>
</body>
</html>
