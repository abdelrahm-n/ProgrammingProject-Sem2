<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagecommissie - Overeenkomsten</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/stagecommissie.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagecommissie</span>
        <button class="btn-terug" onclick="window.location.href='dashboard.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar"></nav>

      <main class="content-area">
        <section class="dashboard-card">
          <h1>Stageovereenkomsten</h1>
          <p>Overeenkomsten die wachten op handtekening van de hogeschool.</p>
        </section>

        <section class="dashboard-card">
          <h2>Wachtend op handtekening</h2>
          <div id="overeenkomstenLijst"></div>
        </section>
      </main>
    </div>
  </div>

  <script>
const API_URL = 'http://localhost:3000';
const token = localStorage.getItem('token');
if (!token) window.location.href = '../index.html';

async function laadOvereenkomsten() {
  try {
    const resp = await fetch(API_URL + '/api/stageovereenkomst/commissie/wachtend', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (resp.status === 401) { window.location.href = '../index.html'; return; }
    const data = await resp.json();
    const container = document.getElementById('overeenkomstenLijst');

    if (!data || data.length === 0) {
      container.innerHTML = '<p>Geen overeenkomsten die op je handtekening wachten.</p>';
      return;
    }

    let html = '<table><thead><tr><th>Student</th><th>Bedrijf</th><th>Mentor</th><th>Periode</th><th>Actie</th></tr></thead><tbody>';
    data.forEach(function(o) {
      var naam = o.student_voornaam + ' ' + o.student_achternaam;
      var mentor = o.mentor_voornaam ? o.mentor_voornaam + ' ' + o.mentor_achternaam : '-';
      var periode = new Date(o.startdatum).toLocaleDateString('nl-BE') + ' - ' + new Date(o.einddatum).toLocaleDateString('nl-BE');
      html += '<tr>';
      html += '<td>' + naam + '</td>';
      html += '<td>' + (o.bedrijf_naam || '-') + '</td>';
      html += '<td>' + mentor + '</td>';
      html += '<td>' + periode + '</td>';
      html += '<td><a href="stageovereenkomst.html?id=' + o.overeenkomst_id + '" class="btn btn--primair btn--sm">Ondertekenen</a></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch (err) {
    document.getElementById('overeenkomstenLijst').innerHTML = '<p>Fout bij laden.</p>';
  }
}

laadOvereenkomsten();
  </script>
  <script src="../js/nav.js"></script>
</body>
</html>
