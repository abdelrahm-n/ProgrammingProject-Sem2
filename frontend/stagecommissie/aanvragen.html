<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageplatform - Stagecommissie - Aanvragen</title>
  <link rel="stylesheet" href="../css/stijl.css" />
  <link rel="stylesheet" href="../css/stagecommissie.css" />
</head>

<body>

  <div id="app">
    <header class="header">
      <div class="header-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <span class="header-logo-text">Stageplatform</span>
      </div>
      <div class="header-actions">
        <span class="header-rol-badge">Stagecommissie</span>
        <button class="btn-terug" onclick="window.location.href='../index.html'">Terug</button>
      </div>
    </header>

    <div class="app-body">
      <nav class="sidebar">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="aanvragen.html" class="nav-item actief">Aanvragen</a>
        <a href="overeenkomsten.html" class="nav-item">Overeenkomsten</a>
        <a href="profiel.html" class="nav-item">Profiel</a>
        <a href="../index.html" class="nav-item" id="uitlogBtn" style="margin-top:auto">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Uitloggen
        </a>
      </nav>
      <main class="content-area">

        <section class="dashboard-card">
          <h1>Stageaanvragen</h1>
          <p>Bekijk en beoordeel de stageaanvragen van studenten.</p>
        </section>

        <!-- LIJST van ingediende aanvragen -->
        <section class="dashboard-card" id="lijst-card">
          <h2>Ingediende aanvragen</h2>
          <div id="aanvraag-lijst">
            <p>Aanvragen laden...</p>
          </div>
        </section>

        <!-- DETAIL van één aanvraag (tabel met alle gegevens) -->
        <section class="dashboard-card stage-aanvraag" id="detail-card" style="display:none;">
          <button class="btn-terug" id="terugNaarLijst" style="margin-bottom:16px;">&larr; Terug naar lijst</button>

          <h2>Aanvraag van <span id="detailTitel"></span></h2>
          <div id="aanvraagStatus" class="status-badge"></div>

          <table class="aanvraag-tabel" style="width:100%;border-collapse:collapse;margin:16px 0;">
            <tbody id="aanvraag-tabel-body"></tbody>
          </table>

          <div id="bestaande-feedback" style="display:none;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px 16px;margin-bottom:16px;">
            <strong>Eerdere feedback:</strong> <span id="bestaande-feedback-tekst"></span>
          </div>

          <div class="actie-knoppen">
            <button class="btn btn--succes" id="btnGoedkeuren">Goedkeuren</button>
            <button class="btn btn--gevaar" id="btnAfkeuren">Afkeuren</button>
            <button class="btn btn--warning" id="btnAanpassing">Aanpassing vereist</button>
          </div>
        </section>
      </main>

      <!-- FEEDBACK POPUP voor afkeuren / aanpassing vereist -->
      <div id="feedback-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-venster">
          <h2 id="feedback-titel">Feedback</h2>
          <p id="feedback-uitleg">Geef feedback voor de student.</p>
          <textarea id="feedback-tekst" rows="5" placeholder="Typ hier je feedback..."></textarea>
          <p id="feedback-fout" style="color:#990018;display:none;">Feedback is verplicht.</p>
          <div class="modal-knoppen">
            <button class="btn" id="feedback-annuleer">Annuleren</button>
            <button class="btn btn--primair" id="feedback-verstuur">Verstuur beslissing</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/stagecommissieAanvragen.js"></script>
  <script src="../js/nav.js"></script>
</body>

</html>
